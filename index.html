<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>久久家烧烤 · 扫码点餐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }
    .app-container {
      max-width: 480px;
      width: 100%;
      background: #0f0f0f;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      min-height: 95vh;
      position: relative;
    }
    /* 头部 */
    .header {
      background: linear-gradient(135deg, #b71c1c 0%, #7f0000 100%);
      padding: 18px 20px;
      text-align: center;
      color: #ffcc80;
      position: relative;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #3e0000;
      margin-bottom: 4px;
    }
    .header .sub {
      font-size: 0.9rem;
      opacity: 0.9;
      letter-spacing: 2px;
    }
    /* 分类导航 */
    .category-nav {
      display: flex;
      background: #1f1f1f;
      padding: 8px 12px;
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid #333;
    }
    .category-nav button {
      background: #2a2a2a;
      border: none;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .category-nav button.active {
      background: #c62828;
      color: white;
      border-color: #ff8a65;
      box-shadow: 0 0 12px rgba(198,40,40,0.6);
    }
    /* 菜单网格 */
    .menu-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      align-content: flex-start;
    }
    .menu-item {
      background: #262626;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: 0.2s;
      border: 1px solid #3a3a3a;
    }
    .menu-item:hover {
      border-color: #c62828;
    }
    .item-img {
      width: 100%;
      aspect-ratio: 1/1;
      background: #333;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .item-img.placeholder {
      background: #2d2d2d;
      color: #666;
      font-size: 2.5rem;
    }
    .item-name {
      font-weight: 700;
      font-size: 1rem;
      color: #f5f5f5;
      margin-bottom: 4px;
      text-align: center;
    }
    .item-price {
      color: #ffb74d;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .item-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }
    .item-actions button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #c62828;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
      line-height: 1;
    }
    .item-actions button:active {
      background: #e53935;
      transform: scale(0.9);
    }
    .item-actions .qty {
      font-weight: 700;
      color: #fff;
      min-width: 20px;
      text-align: center;
      font-size: 1rem;
    }
    /* 购物车悬浮 */
    .cart-float {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #c62828;
      color: white;
      border-radius: 60px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(198,40,40,0.6);
      font-weight: bold;
      cursor: pointer;
      z-index: 20;
      border: 2px solid #ff8a65;
      max-width: 90vw;
    }
    .cart-float .cart-icon {
      font-size: 1.8rem;
    }
    .cart-detail {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 420px;
      background: #1e1e1e;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 30px black;
      z-index: 30;
      display: none;
      color: white;
      border: 1px solid #444;
    }
    .cart-detail.open {
      display: block;
    }
    .cart-item-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }
    .cart-total {
      font-weight: 800;
      margin: 12px 0;
      font-size: 1.2rem;
    }
    .btn-submit {
      background: #ff9800;
      border: none;
      color: black;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .btn-clear {
      background: #444;
      border: none;
      color: white;
      padding: 8px;
      border-radius: 20px;
      margin-top: 5px;
      cursor: pointer;
    }
    /* 管理入口 */
    .admin-entry {
      position: absolute;
      bottom: 5px;
      right: 15px;
      font-size: 0.7rem;
      color: #555;
      cursor: pointer;
      z-index: 5;
    }
    /* 打印小票样式 */
    .print-ticket {
      display: none;
      background: white;
      color: black;
      padding: 20px;
      font-family: monospace;
      width: 280px;
      margin: 0 auto;
      text-align: center;
    }
    @media print {
      body.printing * {
        visibility: hidden;
      }
      body.printing .print-ticket, 
      body.printing .print-ticket * {
        visibility: visible;
      }
      body.printing .print-ticket {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        display: block;
      }
    }
    /* 模态管理面板 */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: #222;
      color: white;
      border-radius: 24px;
      padding: 20px;
      width: 90%;
      max-width: 450px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .tab-buttons button {
      background: #333;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      margin: 5px;
      cursor: pointer;
    }
    .tab-buttons button.active {
      background: #c62828;
    }
    input, textarea {
      background: #333;
      border: 1px solid #555;
      color: white;
      padding: 8px;
      border-radius: 12px;
      width: 100%;
      margin: 5px 0;
    }
    .upload-img-preview {
      width: 50px; height: 50px; border-radius: 10px; object-fit: cover;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="header">
    <h1>🔥久久家烧烤</h1>
    <div class="sub">扫码点餐 · 新鲜现烤</div>
  </div>
  <div class="category-nav" id="categoryNav">
    <button data-cat="all" class="active">全部</button>
    <button data-cat="meat">🍖 肉类</button>
    <button data-cat="vegetable">🥬 蔬菜</button>
    <button data-cat="staple">🍚 主食</button>
  </div>
  <div class="menu-grid" id="menuGrid"></div>
  <div class="cart-float" id="cartFloat">
    <span class="cart-icon">🛒</span>
    <span id="cartTotalPrice">¥0</span>
    <span id="cartCount">0</span>
  </div>
  <div class="cart-detail" id="cartDetail">
    <div id="cartItemsList"></div>
    <div class="cart-total" id="cartDetailTotal">合计：¥0</div>
    <button class="btn-submit" id="submitOrderBtn">📋 确认下单</button>
    <button class="btn-clear" id="clearCartBtn">清空购物车</button>
  </div>
  <div class="admin-entry" id="adminEntry">⚙️ 管理</div>
</div>

<!-- 打印小票容器 -->
<div class="print-ticket" id="printTicketContainer"></div>

<!-- 管理面板模态 -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <div style="display: flex; justify-content: space-between;">
      <h3>🔧 后台管理</h3>
      <button id="closeAdminModal" style="background: none; border: none; color: white; font-size: 1.5rem;">&times;</button>
    </div>
    <div class="tab-buttons">
      <button id="tabImages" class="active">🖼️ 菜品图片</button>
      <button id="tabOrders">🧾 订单记录</button>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- 菜品数据 ----------
    const menuItems = [
      { id: 'bigPork', name: '大串猪肉', price: 1, category: 'meat' },
      { id: 'lamb', name: '鲜切羊肉', price: 3, category: 'meat' },
      { id: 'plumMeat', name: '香辣梅肉', price: 2, category: 'meat' },
      { id: 'crispBone', name: '猪脆骨', price: 2.5, category: 'meat' },
      { id: 'garlicMeat', name: '蒜瓣肉', price: 2, category: 'meat' },
      { id: 'wangjing', name: '望京小腰', price: 3, category: 'meat' },
      { id: 'fishTofu', name: '鱼豆腐', price: 2, category: 'meat' },
      { id: 'cartilage', name: '掌中宝', price: 3, category: 'meat' },
      { id: 'sausage', name: '烤肠', price: 2, category: 'meat' },
      { id: 'beefHeart', name: '牛心管', price: 2, category: 'meat' },
      { id: 'squid', name: '烤鱿鱼', price: 8, category: 'meat' },
      { id: 'chickenWing', name: '烤翅中(大)', price: 7, category: 'meat' },
      { id: 'multiFish', name: '多味鱼', price: 4, category: 'meat' },
      { id: 'pigSkin', name: '碳烤猪皮', price: 1, category: 'meat' },
      { id: 'chives', name: '烤韭菜', price: 10, category: 'vegetable' },
      { id: 'cabbage', name: '烤包菜', price: 10, category: 'vegetable' },
      { id: 'enoki', name: '烤金针菇', price: 10, category: 'vegetable' },
      { id: 'pepper', name: '烤辣椒', price: 1, category: 'vegetable' },
      { id: 'gluten', name: '烤面筋', price: 2, category: 'vegetable' },
      { id: 'driedTofu', name: '烤豆干', price: 1, category: 'vegetable' },
      { id: 'peanut', name: '卤花生', price: 8, category: 'vegetable' },
      { id: 'bread', name: '烤馒头', price: 1, category: 'staple' }
    ];

    // 状态
    let cart = {};                 // { id: quantity }
    let currentCategory = 'all';
    let customImages = {};        // 从localStorage读取 { id: base64/url }

    // DOM元素
    const menuGrid = document.getElementById('menuGrid');
    const categoryNav = document.getElementById('categoryNav');
    const cartFloat = document.getElementById('cartFloat');
    const cartDetail = document.getElementById('cartDetail');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartTotalPrice = document.getElementById('cartTotalPrice');
    const cartCount = document.getElementById('cartCount');
    const cartDetailTotal = document.getElementById('cartDetailTotal');
    const submitOrderBtn = document.getElementById('submitOrderBtn');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const printTicketContainer = document.getElementById('printTicketContainer');
    const adminEntry = document.getElementById('adminEntry');
    const adminModal = document.getElementById('adminModal');
    const closeAdminModal = document.getElementById('closeAdminModal');
    const adminContent = document.getElementById('adminContent');
    const tabImages = document.getElementById('tabImages');
    const tabOrders = document.getElementById('tabOrders');

    // ---------- 工具函数 ----------
    function loadImagesFromStorage() {
      try {
        const stored = localStorage.getItem('jiujiu_menu_images');
        if (stored) customImages = JSON.parse(stored);
        else customImages = {};
      } catch (e) { customImages = {}; }
    }
    function saveImagesToStorage() {
      localStorage.setItem('jiujiu_menu_images', JSON.stringify(customImages));
    }
    function getItemImage(id) {
      return customImages[id] || '';
    }

    // 购物车相关
    function saveCartToLocal() {
      localStorage.setItem('jiujiu_cart', JSON.stringify(cart));
    }
    function loadCartFromLocal() {
      try {
        const saved = localStorage.getItem('jiujiu_cart');
        if (saved) cart = JSON.parse(saved);
        else cart = {};
      } catch (e) { cart = {}; }
    }
    function updateCartUI() {
      let total = 0, count = 0;
      Object.keys(cart).forEach(id => {
        const item = menuItems.find(m => m.id === id);
        if (item && cart[id] > 0) {
          total += item.price * cart[id];
          count += cart[id];
        }
      });
      cartTotalPrice.textContent = '¥' + total.toFixed(1);
      cartCount.textContent = count;
      cartDetailTotal.textContent = '合计：¥' + total.toFixed(1);
      renderCartDetail();
      saveCartToLocal();
    }
    function renderCartDetail() {
      let html = '';
      let hasItem = false;
      Object.keys(cart).forEach(id => {
        const qty = cart[id];
        if (qty <= 0) return;
        const item = menuItems.find(m => m.id === id);
        if (!item) return;
        hasItem = true;
        html += `<div class="cart-item-row">
          <span>${item.name} x${qty}</span>
          <span>¥${(item.price * qty).toFixed(1)}</span>
        </div>`;
      });
      if (!hasItem) html = '<p style="color:#aaa;">购物车空空如也</p>';
      cartItemsList.innerHTML = html;
    }
    function addToCart(id) {
      if (!cart[id]) cart[id] = 0;
      cart[id] += 1;
      updateCartUI();
      renderMenuByCategory(currentCategory);
    }
    function removeFromCart(id) {
      if (cart[id] && cart[id] > 0) {
        cart[id] -= 1;
        if (cart[id] === 0) delete cart[id];
      }
      updateCartUI();
      renderMenuByCategory(currentCategory);
    }
    function clearCart() {
      cart = {};
      updateCartUI();
      renderMenuByCategory(currentCategory);
    }

    // 渲染菜单
    function renderMenuByCategory(cat) {
      currentCategory = cat;
      const filtered = cat === 'all' ? menuItems : menuItems.filter(m => m.category === cat);
      let html = '';
      filtered.forEach(item => {
        const qty = cart[item.id] || 0;
        const imgSrc = getItemImage(item.id);
        const imgStyle = imgSrc ? `background-image:url('${imgSrc}')` : '';
        const imgClass = imgSrc ? '' : 'placeholder';
        const placeholderIcon = imgSrc ? '' : '🍢';
        html += `
          <div class="menu-item">
            <div class="item-img ${imgClass}" style="${imgStyle}">${!imgSrc ? placeholderIcon : ''}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">¥${item.price.toFixed(1)}</div>
            <div class="item-actions">
              <button class="btn-minus" data-id="${item.id}">−</button>
              <span class="qty">${qty}</span>
              <button class="btn-plus" data-id="${item.id}">+</button>
            </div>
          </div>`;
      });
      menuGrid.innerHTML = html;
      // 绑定事件
      document.querySelectorAll('.btn-plus').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          addToCart(btn.dataset.id);
        });
      });
      document.querySelectorAll('.btn-minus').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFromCart(btn.dataset.id);
        });
      });
    }

    // 分类切换
    categoryNav.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        document.querySelectorAll('.category-nav button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderMenuByCategory(e.target.dataset.cat);
      }
    });

    // 购物车浮动按钮点击
    cartFloat.addEventListener('click', () => {
      cartDetail.classList.toggle('open');
    });
    // 点击其他区域关闭购物车详情（简单处理）
    document.addEventListener('click', (e) => {
      if (!cartDetail.contains(e.target) && e.target !== cartFloat && !cartFloat.contains(e.target)) {
        cartDetail.classList.remove('open');
      }
    });

    clearCartBtn.addEventListener('click', clearCart);

    // 下单并打印
    submitOrderBtn.addEventListener('click', () => {
      const hasItems = Object.values(cart).some(qty => qty > 0);
      if (!hasItems) {
        alert('请先选择菜品');
        return;
      }
      const remark = prompt('请输入桌号或备注（可选）：', '');
      const orderId = 'JJ' + Date.now();
      const orderTime = new Date().toLocaleString();
      const itemsSnapshot = menuItems.filter(m => cart[m.id] > 0).map(m => ({
        name: m.name,
        price: m.price,
        quantity: cart[m.id],
        subtotal: m.price * cart[m.id]
      }));
      const totalAmount = itemsSnapshot.reduce((sum, i) => sum + i.subtotal, 0);
      const order = {
        id: orderId,
        time: orderTime,
        items: itemsSnapshot,
        total: totalAmount,
        remark: remark || ''
      };
      // 保存订单到localStorage
      const orders = JSON.parse(localStorage.getItem('jiujiu_orders') || '[]');
      orders.push(order);
      localStorage.setItem('jiujiu_orders', JSON.stringify(orders));

      // 构建小票HTML
      let ticketHTML = `
        <div style="text-align:center; font-family:monospace;">
          <h2>久久家烧烤</h2>
          <p>订单号：${order.id}</p>
          <p>${order.time}</p>
          ${remark ? `<p>备注：${remark}</p>` : ''}
          <hr>
          <table style="width:100%; text-align:left;">
            <tr><th>菜品</th><th>数量</th><th>小计</th></tr>`;
      itemsSnapshot.forEach(it => {
        ticketHTML += `<tr><td>${it.name}</td><td>x${it.quantity}</td><td>¥${it.subtotal.toFixed(1)}</td></tr>`;
      });
      ticketHTML += `</table><hr><p style="font-weight:bold;">合计：¥${totalAmount.toFixed(1)}</p><p>谢谢惠顾！</p></div>`;
      
      printTicketContainer.innerHTML = ticketHTML;
      
      // 触发打印
      document.body.classList.add('printing');
      setTimeout(() => {
        window.print();
        setTimeout(() => {
          document.body.classList.remove('printing');
        }, 500);
      }, 100);
      
      // 清空购物车
      cart = {};
      updateCartUI();
      renderMenuByCategory(currentCategory);
      cartDetail.classList.remove('open');
    });

    // ---------- 管理后台 ----------
    function renderAdminImagesTab() {
      let html = '<h4>点击菜品修改图片 (URL或上传)</h4>';
      menuItems.forEach(item => {
        const currentImg = getItemImage(item.id) || '';
        html += `
          <div style="display:flex; align-items:center; gap:10px; margin:10px 0; flex-wrap:wrap;">
            <span style="width:80px;">${item.name}</span>
            <img class="upload-img-preview" src="${currentImg || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22%3E%3Crect fill=%22%23333%22 width=%2250%22 height=%2250%22/%3E%3Ctext fill=%22%23666%22 x=%2210%22 y=%2235%22%3E无图%3C/text%3E%3C/svg%3E'}" alt="">
            <input type="text" placeholder="图片URL" id="url_${item.id}" value="${currentImg.startsWith('data:') ? '' : currentImg}" style="width:140px;">
            <input type="file" accept="image/*" id="file_${item.id}" style="width:100px;">
            <button data-id="${item.id}" class="save-img-btn">保存</button>
          </div>`;
      });
      adminContent.innerHTML = html;
      document.querySelectorAll('.save-img-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const urlInput = document.getElementById('url_' + id);
          const fileInput = document.getElementById('file_' + id);
          if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
              customImages[id] = e.target.result;
              saveImagesToStorage();
              renderMenuByCategory(currentCategory);
              renderAdminImagesTab();
              alert('图片已更新');
            };
            reader.readAsDataURL(fileInput.files[0]);
          } else if (urlInput.value.trim()) {
            customImages[id] = urlInput.value.trim();
            saveImagesToStorage();
            renderMenuByCategory(currentCategory);
            renderAdminImagesTab();
            alert('图片URL已更新');
          } else {
            alert('请提供图片URL或选择文件');
          }
        });
      });
    }

    function renderAdminOrdersTab() {
      const orders = JSON.parse(localStorage.getItem('jiujiu_orders') || '[]');
      if (orders.length === 0) {
        adminContent.innerHTML = '<p>暂无订单记录</p>';
        return;
      }
      let html = '<div style="max-height:300px; overflow-y:auto;">';
      orders.slice().reverse().forEach(order => {
        html += `<div style="background:#333; border-radius:12px; padding:10px; margin:8px 0;">
          <strong>${order.id}</strong> <small>${order.time}</small> ${order.remark ? '📌'+order.remark : ''}
          <br>合计：¥${order.total.toFixed(1)}
          <button class="reprint-btn" data-orderid="${order.id}">🖨️ 补打小票</button>
        </div>`;
      });
      html += '</div>';
      adminContent.innerHTML = html;
      document.querySelectorAll('.reprint-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const orderId = btn.dataset.orderid;
          const ordersArr = JSON.parse(localStorage.getItem('jiujiu_orders') || '[]');
          const order = ordersArr.find(o => o.id === orderId);
          if (order) {
            let ticketHTML = `<div style="text-align:center; font-family:monospace;"><h2>久久家烧烤</h2><p>订单号：${order.id}</p><p>${order.time}</p>${order.remark ? '<p>备注：'+order.remark+'</p>':''}<hr><table style="width:100%;">`;
            order.items.forEach(it => ticketHTML += `<tr><td>${it.name}</td><td>x${it.quantity}</td><td>¥${it.subtotal.toFixed(1)}</td></tr>`);
            ticketHTML += `</table><hr><p><strong>合计：¥${order.total.toFixed(1)}</strong></p></div>`;
            printTicketContainer.innerHTML = ticketHTML;
            document.body.classList.add('printing');
            setTimeout(() => {
              window.print();
              setTimeout(() => document.body.classList.remove('printing'), 500);
            }, 100);
          }
        });
      });
    }

    function openAdminPanel() {
      const password = prompt('请输入管理密码：');
      if (password !== '9999') {
        alert('密码错误');
        return;
      }
      adminModal.classList.add('open');
      renderAdminImagesTab();
      tabImages.classList.add('active');
      tabOrders.classList.remove('active');
    }

    tabImages.addEventListener('click', () => {
      tabImages.classList.add('active');
      tabOrders.classList.remove('active');
      renderAdminImagesTab();
    });
    tabOrders.addEventListener('click', () => {
      tabOrders.classList.add('active');
      tabImages.classList.remove('active');
      renderAdminOrdersTab();
    });

    closeAdminModal.addEventListener('click', () => {
      adminModal.classList.remove('open');
    });
    adminEntry.addEventListener('click', openAdminPanel);

    // 初始化
    loadImagesFromStorage();
    loadCartFromLocal();
    renderMenuByCategory('all');
    updateCartUI();
  })();
</script>
</body>
</html>
