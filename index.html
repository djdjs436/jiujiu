  // 订单管理
  let allOrders = [];
  function startListening() { ordersRef.off(); ordersRef.on('child_added', (snapshot) => { const order = snapshot.val(); allOrders.unshift({ key: snapshot.key, ...order }); autoPrint(order); playNotification(); renderOrders(); }); ordersRef.on('child_removed', (snapshot) => { allOrders = allOrders.filter(o => o.key !== snapshot.key); renderOrders(); }); ordersRef.on('child_changed', (snapshot) => { const index = allOrders.findIndex(o => o.key === snapshot.key); if (index !== -1) allOrders[index] = { key: snapshot.key, ...snapshot.val() }; renderOrders(); }); }

  function renderOrders() { const list = document.getElementById('orderList'), settleBtn = document.getElementById('settleTableBtn'), tableTotalDiv = document.getElementById('tableTotal'); let filtered = allOrders; if (currentTableFilter !== 'all') { filtered = filtered.filter(o => o.table == currentTableFilter); settleBtn.style.display = 'inline-block'; } else settleBtn.style.display = 'none'; if (currentSearch) filtered = filtered.filter(o => o.orderNumber && o.orderNumber.includes(currentSearch)); let tableTotal = 0; filtered.forEach(o => { if (!o.settled) tableTotal += parseFloat(o.total); }); tableTotalDiv.innerText = currentTableFilter === 'all' ? '' : '桌号 ' + currentTableFilter + ' 未结算总额：¥' + tableTotal.toFixed(2); if (filtered.length === 0) { list.innerHTML = '<p style="color:#999;">暂无订单</p>'; return; } let ordersHtml = ''; filtered.forEach(order => { const settledClass = order.settled ? 'settled' : ''; let itemsHtml = ''; order.items.forEach(i => itemsHtml += '<li>' + i.name + ' ' + i.spicy + ' ×' + i.qty + ' - ¥' + i.subtotal + '</li>'); ordersHtml += '<div class="order-card ' + settledClass + '" id="order-' + order.key + '"><strong>🕒 ' + order.time + '</strong> | 🪑 ' + (order.table || '无') + ' | ' + (order.isPack || '堂食') + (order.settled ? ' (已结算)' : '') + '<br>单号：' + (order.orderNumber || '无') + (order.remark ? '<br>备注：' + order.remark : '') + '<br>合计 ¥' + order.total + '<ul style="margin:6px 0; padding-left:20px;">' + itemsHtml + '</ul><button class="print-btn" onclick="reprint(\'' + order.key + '\')">🖨️ 补打</button>' + (!order.settled ? '<button class="modify-btn" onclick="modifyOrder(\'' + order.key + '\')">✏️ 修改</button>' : '') + '<button style="background:#e74c3c;color:white;border:none;padding:4px 12px;border-radius:10px;font-size:12px;" onclick="deleteOrder(\'' + order.key + '\')">删除</button></div>'; }); list.innerHTML = ordersHtml; }

  function showStatistics() {
    const today = new Date().toLocaleDateString();
    let html = '<div class="modal-overlay" id="statsModal"><div class="modal-content" style="max-width:450px;"><div class="modal-title">📊 销售统计</div>';
    html += '<div class="modal-input-group"><label>日期</label><input type="date" id="statsDate" value="' + new Date().toISOString().split('T')[0] + '"></div>';
    html += '<button onclick="loadStats()">查询</button>';
    html += '<div id="statsResult" style="margin-top:10px;"></div>';
    html += '<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById(\'statsModal\').remove()">关闭</button></div></div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    loadStats();
  }
  function loadStats() {
    const dateInput = document.getElementById('statsDate');
    if (!dateInput) return;
    const dateStr = dateInput.value;
    const targetDate = new Date(dateStr + 'T00:00:00');
    const nextDate = new Date(targetDate);
    nextDate.setDate(nextDate.getDate() + 1);

    // 获取所有订单
    ordersRef.once('value').then(snapshot => {
      const allOrders = [];
      snapshot.forEach(child => allOrders.push({ key: child.key, ...child.val() }));
      // 筛选当日订单
      const dayOrders = allOrders.filter(order => {
        const orderDate = new Date(order.timestamp);
        return orderDate >= targetDate && orderDate < nextDate;
      });

      // 统计菜品销售数量
      const salesMap = {};
      let totalAmount = 0;
      dayOrders.forEach(order => {
        totalAmount += parseFloat(order.total);
        order.items.forEach(item => {
          salesMap[item.name] = (salesMap[item.name] || 0) + item.qty;
        });
      });

      // 获取预备库存
      prepStockRef.once('value').then(stockSnap => {
        const stockData = stockSnap.val() || {};
        let resultHtml = '<p>总销售额：¥' + totalAmount.toFixed(2) + '</p>';
        resultHtml += '<table style="width:100%; border-collapse:collapse;"><tr><th>菜品</th><th>销量</th><th>预备</th><th>剩余</th></tr>';
        Object.entries(salesMap).forEach(([name, sold]) => {
          const prep = stockData[name] || 0;
          const remain = prep - sold;
          resultHtml += '<tr><td>' + name + '</td><td>' + sold + '</td><td><input type="number" id="stock_' + name + '" value="' + prep + '" style="width:50px;"></td><td>' + remain + '</td></tr>';
        });
        resultHtml += '</table>';
        resultHtml += '<button onclick="savePrepStock()">保存预备库存</button>';
        document.getElementById('statsResult').innerHTML = resultHtml;
      });
    });
  }
  function savePrepStock() {
    const inputs = document.querySelectorAll('#statsResult input');
    const updates = {};
    inputs.forEach(input => {
      const name = input.id.replace('stock_', '');
      const val = parseInt(input.value) || 0;
      updates[name] = val;
    });
    prepStockRef.update(updates).then(() => alert('库存已更新'));
  }

  function encodeGBK(str) {
    const bytes = [];
    for (let c of str) {
      const code = c.charCodeAt(0);
      if (code <= 0x7F) bytes.push(code);
      else { const gbk = gbkMap.get(c); if (gbk) bytes.push(gbk[0], gbk[1]); else bytes.push(0x20); }
    }
    return new Uint8Array(bytes);
  }

  function build72mmESC(order) {
    let str = '\x1B\x40'; str += '\x1B\x61\x01'; str += '\x1B\x21\x30'; str += '久久家一元烧烤\n'; str += '\x1B\x21\x00';
    str += '----------------------------\n'; str += '\x1B\x61\x00';
    str += '时间：' + order.time + '\n'; str += '单号：' + (order.orderNumber || '无') + '\n';
    str += '\x1B\x45\x01\x1B\x21\x30'; str += '桌号：' + order.table + '  ' + order.isPack + '\n';
    str += '\x1B\x21\x00\x1B\x45\x00'; str += '----------------------------\n';
    str += '品名       数量  小计\n';
    order.items.forEach(item => {
      let printName = item.name.replace(/鱿/g, '尤');
      const name = printName.padEnd(7, ' '); const qty = item.qty.toString().padStart(2, ' '); const subtotal = item.subtotal.toFixed(2).padStart(6, ' ');
      str += name + ' ' + qty + ' ' + subtotal + '\n';
      str += '  ' + item.spicy + '\n';
    });
    if (order.remark) { str += '----------------------------\n'; str += '备注：' + order.remark + '\n'; }
    str += '----------------------------\n'; str += '\x1B\x61\x02'; str += '合计：¥ ' + order.total + '\n';
    str += '\x1B\x61\x01'; str += '谢谢惠顾，欢迎再次光临\n'; str += '\n\n\n'; str += '\x1D\x56\x42\x00';
    return encodeGBK(str);
  }
