<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>久久家烧烤 · 扫码点餐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a; color: #f0e6d2; padding: 20px 12px 120px;
    }
    .header {
      text-align: center; margin-bottom: 20px;
    }
    .header h1 {
      font-size: 2.2rem; color: #ff6b35; letter-spacing: 2px;
      text-shadow: 0 0 8px #ff4400; font-weight: 700;
    }
    .header p { font-size: 0.95rem; color: #ccc; margin-top: 4px; }
    .menu-section { margin-bottom: 25px; }
    .section-title {
      font-size: 1.3rem; border-left: 5px solid #ff6b35; padding-left: 12px;
      margin-bottom: 12px; font-weight: 600; color: #ffaa5e;
    }
    .item {
      display: flex; align-items: center; justify-content: space-between;
      background: #2c2c2c; border-radius: 16px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .item-info { flex: 1; }
    .item-name { font-size: 1.1rem; font-weight: 500; color: #fbe9d7; }
    .item-price { font-size: 0.9rem; color: #ffb080; margin-top: 2px; }
    .quantity-control {
      display: flex; align-items: center; gap: 12px; margin-left: 10px;
    }
    .qty-btn {
      background: #ff6b35; border: none; color: white; width: 32px; height: 32px;
      border-radius: 50%; font-size: 1.4rem; font-weight: bold; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s; box-shadow: 0 2px 6px rgba(255,107,53,0.5);
    }
    .qty-btn:active { background: #e55a2b; transform: scale(0.95); }
    .qty-num { font-size: 1.1rem; font-weight: 700; min-width: 24px; text-align: center; color: #fff; }
    .cart-summary {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #242424; border-top: 2px solid #ff6b35;
      padding: 16px 20px 24px; box-shadow: 0 -4px 20px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; font-size: 1.3rem; font-weight: 700;
    }
    .total-price { color: #ff6b35; font-size: 1.7rem; }
    .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
    .input-group input {
      flex: 1; padding: 12px 14px; border-radius: 12px; border: none;
      background: #3a3a3a; color: #fff; font-size: 1rem;
    }
    .input-group input::placeholder { color: #aaa; }
    .submit-btn {
      width: 100%; background: #ff6b35; border: none; color: white;
      padding: 16px; border-radius: 16px; font-size: 1.2rem; font-weight: 700;
      letter-spacing: 1px; transition: 0.2s; cursor: pointer;
      box-shadow: 0 4px 14px rgba(255,107,53,0.6);
    }
    .submit-btn:active { background: #e55a2b; transform: scale(0.97); }
    .empty-cart-message { text-align: center; color: #aaa; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 久久家烧烤</h1>
    <p>扫码点餐 · 现点现烤</p>
  </div>

  <div id="menu-container"></div>

  <div class="cart-summary" id="cart-summary">
    <div class="total-row">
      <span>🧾 合计</span>
      <span class="total-price" id="total-price">¥0.00</span>
    </div>
    <div class="input-group">
      <input type="text" id="table-number" placeholder="桌号 (必填)" />
      <input type="text" id="note" placeholder="备注 (选填)" />
    </div>
    <button class="submit-btn" id="submit-order">📋 确认下单</button>
    <div class="empty-cart-message" id="cart-hint">请选择至少一种美味</div>
  </div>

  <script>
    // ===== 替换为你的 Formspree Form ID =====
    const FORMSPREE_ID = "YOUR_FORM_ID"; // 注册 formspree.io 获取

    const menuData = [
      { category: "🍖 招牌肉串", items: [
        { name: "大串猪肉", price: 1 },
        { name: "鲜切羊肉", price: 3 },
        { name: "香辣梅肉", price: 2 },
        { name: "猪脆骨", price: 2.5 },
        { name: "蒜瓣肉", price: 2 },
        { name: "望京小腰", price: 3 },
        { name: "掌中宝", price: 3 },
        { name: "牛心管", price: 2 },
      ]},
      { category: "🍡 人气烤物", items: [
        { name: "鱼豆腐", price: 2 },
        { name: "烤肠", price: 2 },
        { name: "烤鱿鱼", price: 8 },
        { name: "烤翅中（大）", price: 7 },
        { name: "多味鱼", price: 4 },
        { name: "碳烤猪皮", price: 1 },
        { name: "烤面筋", price: 2 },
      ]},
      { category: "🥬 锡纸蔬菜/其他", items: [
        { name: "烤韭菜", price: 10 },
        { name: "烤包菜", price: 10 },
        { name: "烤金针菇", price: 10 },
        { name: "烤豆干", price: 1 },
        { name: "烤辣椒", price: 1 },
        { name: "烤馒头", price: 1 },
        { name: "卤花生", price: 8 },
      ]}
    ];

    const cart = {};

    // 初始化购物车
    menuData.forEach(cat => {
      cat.items.forEach(item => { cart[item.name] = 0; });
    });

    function renderMenu() {
      const container = document.getElementById("menu-container");
      container.innerHTML = "";
      menuData.forEach(cat => {
        const section = document.createElement("div");
        section.className = "menu-section";
        section.innerHTML = `<div class="section-title">${cat.category}</div>`;
        cat.items.forEach(item => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "item";
          itemDiv.innerHTML = `
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-price">¥${item.price.toFixed(2)}/份</div>
            </div>
            <div class="quantity-control">
              <button class="qty-btn" data-action="minus" data-name="${item.name}">−</button>
              <span class="qty-num" id="qty-${item.name.replace(/\s+/g, '-')}">0</span>
              <button class="qty-btn" data-action="plus" data-name="${item.name}">+</button>
            </div>
          `;
          section.appendChild(itemDiv);
        });
        container.appendChild(section);
      });
    }

    function updateQuantity(name, delta) {
      if (cart[name] === undefined) return;
      const newQty = cart[name] + delta;
      if (newQty < 0) return;
      cart[name] = newQty;
      const id = name.replace(/\s+/g, '-');
      const span = document.getElementById(`qty-${id}`);
      if (span) span.textContent = newQty;
      updateTotal();
    }

    function updateTotal() {
      let sum = 0;
      menuData.forEach(cat => {
        cat.items.forEach(item => {
          sum += cart[item.name] * item.price;
        });
      });
      document.getElementById("total-price").textContent = `¥${sum.toFixed(2)}`;
    }

    function gatherOrderText() {
      let text = "桌号：" + (document.getElementById("table-number").value.trim() || "未填") + "\n";
      const note = document.getElementById("note").value.trim();
      if (note) text += "备注：" + note + "\n";
      text += "---\n";
      let hasItem = false;
      menuData.forEach(cat => {
        cat.items.forEach(item => {
          if (cart[item.name] > 0) {
            hasItem = true;
            text += `${item.name} ×${cart[item.name]}  ¥${(cart[item.name] * item.price).toFixed(2)}\n`;
          }
        });
      });
      if (!hasItem) text += "（未选择菜品）\n";
      const total = Object.values(cart).reduce((acc, q) => acc + q, 0) > 0 ?
        document.getElementById("total-price").textContent : "¥0.00";
      text += `合计: ${total}`;
      return text;
    }

    async function submitOrder() {
      const table = document.getElementById("table-number").value.trim();
      if (!table) { alert("请填写桌号"); return; }
      const hasAnyItem = Object.values(cart).some(q => q > 0);
      if (!hasAnyItem) { alert("请至少选择一份菜品"); return; }

      const orderText = gatherOrderText();
      const formData = new FormData();
      formData.append("桌号", table);
      formData.append("订单详情", orderText);
      formData.append("备注", document.getElementById("note").value.trim());
      // Formspree 邮件通知需要 _replyto 或 email 字段，若没有可隐藏
      formData.append("_subject", `久久家烧烤新订单 - ${table}桌`);

      try {
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: "POST",
          body: formData,
          headers: { Accept: "application/json" }
        });
        if (res.ok) {
          alert("下单成功！店家已收到订单，马上为您准备～");
          // 清空购物车
          menuData.forEach(cat => cat.items.forEach(item => cart[item.name] = 0));
          document.querySelectorAll(".qty-num").forEach(el => el.textContent = "0");
          updateTotal();
          document.getElementById("table-number").value = "";
          document.getElementById("note").value = "";
        } else {
          alert("提交失败，请稍后重试或直接告知服务员。");
        }
      } catch (e) {
        alert("网络异常，请检查网络后重试。");
      }
    }

    // 事件绑定
    document.addEventListener("click", (e) => {
      if (e.target.classList.contains("qty-btn")) {
        const action = e.target.dataset.action;
        const name = e.target.dataset.name;
        const delta = action === "plus" ? 1 : -1;
        updateQuantity(name, delta);
      }
    });

    document.getElementById("submit-order").addEventListener("click", submitOrder);

    // 启动
    renderMenu();
    updateTotal();
  </script>
</body>
</html>
