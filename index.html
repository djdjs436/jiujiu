<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>久久家烧烤 · 扫码点餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; color: #f5e6d3;
            max-width: 480px; margin: 0 auto; padding: 15px;
        }
        .header {
            text-align: center; margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px; color: #f8b500; letter-spacing: 2px;
        }
        .header .sub {
            font-size: 14px; color: #ccc; margin-top: 5px;
        }
        .tabs {
            display: flex; gap: 8px; margin-bottom: 15px;
        }
        .tab {
            flex: 1; padding: 12px; text-align: center;
            background: #2c2c2c; border-radius: 8px;
            color: #ddd; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s; border: 2px solid transparent;
        }
        .tab.active {
            background: #f8b500; color: #1a1a1a; border-color: #fff3cd;
        }
        .menu-list {
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 100px;
        }
        .menu-item {
            background: #2c2c2c; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .menu-item .info {
            display: flex; align-items: center; gap: 12px; flex: 1;
        }
        .menu-item img {
            width: 60px; height: 60px; object-fit: cover;
            border-radius: 8px; background: #444;
            display: none; /* 默认隐藏，有图片地址时显示 */
        }
        .menu-item .name-price {
            display: flex; flex-direction: column;
        }
        .menu-item .name {
            font-size: 18px; font-weight: bold;
        }
        .menu-item .price {
            font-size: 14px; color: #f8b500; margin-top: 4px;
        }
        .qty-ctrl {
            display: flex; align-items: center; gap: 8px;
        }
        .qty-ctrl button {
            width: 32px; height: 32px; border-radius: 50%;
            background: #f8b500; color: #1a1a1a; font-size: 20px;
            font-weight: bold; border: none; cursor: pointer; line-height: 1;
        }
        .qty-ctrl .qty {
            min-width: 20px; text-align: center; font-size: 18px; font-weight: bold;
        }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px;
            margin: 0 auto; background: #222; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 2px solid #f8b500; z-index: 10;
        }
        .total-text {
            font-size: 20px; font-weight: bold;
        }
        .total-price {
            color: #f8b500; font-size: 24px; font-weight: bold;
        }
        .order-btn {
            background: #f8b500; color: #1a1a1a; border: none;
            padding: 12px 25px; border-radius: 30px; font-size: 18px;
            font-weight: bold; cursor: pointer;
        }
        /* 打印区域默认隐藏 */
        #printArea {
            display: none;
        }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea {
                position: absolute; left: 0; top: 0; width: 100%;
                display: block !important; background: white; color: black;
                padding: 10px; font-size: 14px;
            }
            .bottom-bar, .tabs, .header, .menu-list { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 久久家烧烤</h1>
        <div class="sub">扫码点餐 · 新鲜现烤</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-cat="meat">🥩 肉类</div>
        <div class="tab" data-cat="veg">🥬 蔬菜</div>
        <div class="tab" data-cat="staple">🍚 主食</div>
    </div>

    <div class="menu-list" id="menuList"></div>

    <div class="bottom-bar">
        <div>
            <span class="total-text">合计：</span>
            <span class="total-price" id="totalDisplay">¥0</span>
        </div>
        <button class="order-btn" id="orderBtn">📋 下单并打印</button>
    </div>

    <!-- 打印小票内容区域（下单后动态填充） -->
    <div id="printArea"></div>

    <script>
        // ==================== 菜品数据配置 ====================
        // 商家可自行替换每道菜的图片链接（支持网络图片或相对路径）
        const menuData = [
            // 肉类
            { name: "大串猪肉", price: 1, cat: "meat", img: "" },
            { name: "鲜切羊肉", price: 3, cat: "meat", img: "" },
            { name: "香辣梅肉", price: 2, cat: "meat", img: "" },
            { name: "猪脆骨", price: 2.5, cat: "meat", img: "" },
            { name: "蒜瓣肉", price: 2, cat: "meat", img: "" },
            { name: "望京小腰", price: 3, cat: "meat", img: "" },
            { name: "鱼豆腐", price: 2, cat: "meat", img: "" },
            { name: "掌中宝", price: 3, cat: "meat", img: "" },
            { name: "烤肠", price: 2, cat: "meat", img: "" },
            { name: "牛心管", price: 2, cat: "meat", img: "" },
            { name: "烤鱿鱼", price: 8, cat: "meat", img: "" },
            { name: "烤翅中（大）", price: 7, cat: "meat", img: "" },
            { name: "多味鱼", price: 4, cat: "meat", img: "" },
            { name: "碳烤猪皮", price: 1, cat: "meat", img: "" },
            // 蔬菜
            { name: "烤韭菜", price: 10, cat: "veg", img: "" },
            { name: "烤面筋", price: 2, cat: "veg", img: "" },
            { name: "烤豆干", price: 1, cat: "veg", img: "" },
            { name: "烤辣椒", price: 1, cat: "veg", img: "" },
            { name: "烤包菜", price: 10, cat: "veg", img: "" },
            { name: "烤金针菇", price: 10, cat: "veg", img: "" },
            { name: "卤花生", price: 8, cat: "veg", img: "" },
            // 主食
            { name: "烤馒头", price: 1, cat: "staple", img: "" }
        ];

        // 当前选中的分类
        let currentCat = "meat";
        // 购物车：{ index: quantity }
        let cart = {};

        // ==================== Webhook 通知配置 ====================
        // 使用 Server酱 或其他推送服务，将下方链接替换为你自己的 Webhook 地址
        const WEBHOOK_URL = ""; // 例如 "https://sctapi.ftqq.com/你的SENDKEY.send"

        // ==================== 渲染函数 ====================
        function renderMenu() {
            const filtered = menuData.filter(item => item.cat === currentCat);
            const container = document.getElementById("menuList");
            container.innerHTML = filtered.map((item, idx) => {
                const globalIndex = menuData.indexOf(item);
                const qty = cart[globalIndex] || 0;
                const imgHtml = item.img 
                    ? `<img src="${item.img}" alt="${item.name}" style="display:block;">` 
                    : `<img src="" style="display:none;">`;
                return `
                    <div class="menu-item">
                        <div class="info">
                            ${imgHtml}
                            <div class="name-price">
                                <div class="name">${item.name}</div>
                                <div class="price">¥${item.price.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="qty-ctrl">
                            <button onclick="changeQty(${globalIndex}, -1)">−</button>
                            <span class="qty">${qty}</span>
                            <button onclick="changeQty(${globalIndex}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join("");
            updateTotal();
        }

        function changeQty(index, delta) {
            if (!cart[index]) cart[index] = 0;
            const newQty = cart[index] + delta;
            if (newQty < 0) return;
            cart[index] = newQty;
            renderMenu();
        }

        function updateTotal() {
            let total = 0;
            for (const [idx, qty] of Object.entries(cart)) {
                if (qty > 0) total += menuData[idx].price * qty;
            }
            document.getElementById("totalDisplay").textContent = `¥${total.toFixed(2)}`;
        }

        // ==================== 分类切换 ====================
        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", function() {
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                this.classList.add("active");
                currentCat = this.dataset.cat;
                renderMenu();
            });
        });

        // ==================== 下单 & 打印 ====================
        document.getElementById("orderBtn").addEventListener("click", function() {
            const orderedItems = [];
            let total = 0;
            for (const [idx, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = menuData[idx];
                    const subtotal = item.price * qty;
                    orderedItems.push({ name: item.name, price: item.price, qty, subtotal });
                    total += subtotal;
                }
            }
            if (orderedItems.length === 0) {
                alert("请至少选择一道菜品");
                return;
            }

            const orderId = "JJBQ" + Date.now().toString(36).toUpperCase();
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            // 构建打印小票内容
            let printHtml = `
                <div style="text-align:center; font-size:16px; font-weight:bold; margin-bottom:5px;">久久家烧烤</div>
                <div style="text-align:center; font-size:12px; margin-bottom:10px;">订单号：${orderId}<br>${timeStr}</div>
                <hr>
                <table style="width:100%; font-size:14px; border-collapse:collapse;">
                    <tr><td>菜品</td><td>单价</td><td>数量</td><td>小计</td></tr>
            `;
            orderedItems.forEach(it => {
                printHtml += `<tr><td>${it.name}</td><td>¥${it.price.toFixed(2)}</td><td>${it.qty}</td><td>¥${it.subtotal.toFixed(2)}</td></tr>`;
            });
            printHtml += `</table><hr>`;
            printHtml += `<div style="text-align:right; font-size:16px; font-weight:bold;">合计：¥${total.toFixed(2)}</div>`;
            printHtml += `<div style="text-align:center; margin-top:10px; font-size:12px;">谢谢惠顾，祝您用餐愉快！</div>`;

            document.getElementById("printArea").innerHTML = printHtml;

            // 发送 Webhook 通知店家（如已配置）
            if (WEBHOOK_URL) {
                const payload = {
                    title: "久久家烧烤 · 新订单",
                    desp: `## 新订单 ${orderId}\n时间：${timeStr}\n\n${orderedItems.map(i=>`- ${i.name} x${i.qty}  ¥${i.subtotal.toFixed(2)}`).join('\n')}\n\n**合计：¥${total.toFixed(2)}**`
                };
                fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                }).catch(e => console.log("通知发送失败，请检查Webhook配置", e));
            }

            // 调用浏览器打印（自动弹出打印对话框，用户可选择打印机）
            window.print();

            // 下单后清空购物车（可选）
            cart = {};
            renderMenu();
        });

        // 初始渲染
        renderMenu();
    </script>
</body>
</html>
