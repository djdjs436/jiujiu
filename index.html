<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>久久家烧烤 · 扫码点餐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    }
    body {
      background: #1f1f1f;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0 0 20px 0;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(255, 140, 0, 0.15);
      position: relative;
      border-radius: 0;
    }
    /* 头部 */
    .header {
      background: linear-gradient(135deg, #b64900 0%, #e07b20 100%);
      padding: 24px 20px 18px;
      text-align: center;
      color: #ffefc0;
      border-bottom: 3px solid #ffb347;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: "";
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      background: rgba(255,255,200,0.2);
      border-radius: 50%;
    }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-shadow: 2px 2px 0 #8b3a00;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .header .sub {
      font-size: 0.9rem;
      color: #fff3d6;
      letter-spacing: 2px;
      font-weight: 500;
      background: rgba(0,0,0,0.25);
      display: inline-block;
      padding: 4px 18px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }
    /* 分类导航 */
    .category-nav {
      display: flex;
      background: #1a1a1a;
      padding: 10px 16px;
      gap: 10px;
      border-bottom: 1px solid #3a2a1a;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    .cat-btn {
      flex: 1;
      background: #2c2c2c;
      border: none;
      color: #b0b0b0;
      padding: 12px 0;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .cat-btn.active {
      background: #e07b20;
      color: #0a0a0a;
      box-shadow: 0 0 18px #ff7b1c;
      font-weight: 700;
      transform: scale(1.02);
    }
    /* 菜单列表 */
    .menu-list {
      flex: 1;
      padding: 16px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .menu-item {
      background: #1e1e1e;
      border-radius: 20px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #3d2e1c;
      transition: all 0.2s;
    }
    .menu-item:hover {
      border-color: #e07b20;
    }
    .item-info {
      display: flex;
      flex-direction: column;
    }
    .item-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f5e6d3;
      letter-spacing: 0.5px;
    }
    .item-price {
      font-size: 0.9rem;
      color: #ffa64d;
      margin-top: 4px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .price-symbol {
      font-size: 0.8rem;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      background: #3a3a3a;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.4rem;
      font-weight: bold;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      line-height: 1;
    }
    .qty-btn:active {
      background: #e07b20;
      transform: scale(0.92);
    }
    .qty-num {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffb85c;
      min-width: 24px;
      text-align: center;
    }
    /* 购物车栏 */
    .cart-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 448px;
      background: #2a1f14;
      backdrop-filter: blur(20px);
      border-radius: 50px;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 10px 30px rgba(255, 100, 0, 0.4);
      border: 1px solid #e07b20;
      z-index: 20;
      color: #fff;
    }
    .cart-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .cart-icon-wrap {
      background: #e07b20;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      position: relative;
    }
    .badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #ff3b3b;
      color: white;
      border-radius: 20px;
      font-size: 0.7rem;
      padding: 2px 7px;
      font-weight: bold;
      min-width: 20px;
      text-align: center;
    }
    .total-price {
      font-size: 1.3rem;
      color: #ffae42;
    }
    .cart-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      background: transparent;
      border: 1px solid #e07b20;
      color: #ffae42;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(0,0,0,0.4);
    }
    .order-btn {
      background: #e07b20;
      color: #0a0a0a;
      border: none;
      font-weight: 700;
    }
    /* 弹窗：购物车详情 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1e1b17;
      width: 90%;
      max-width: 400px;
      border-radius: 32px;
      padding: 20px;
      border: 2px solid #e07b20;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      color: #ffb85c;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }
    .cart-item-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #5a4a32;
      color: #ddd;
    }
    .remove-item {
      color: #ff7b7b;
      margin-left: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    .modal-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .close-modal {
      background: #444;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    /* 订单打印区域 (隐藏，打印时显示) */
    .print-order {
      display: none;
    }
    @media print {
      body * {
        visibility: hidden;
      }
      .print-order, .print-order * {
        visibility: visible;
      }
      .print-order {
        display: block !important;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: white;
        color: black;
        padding: 20px;
        font-size: 14px;
        z-index: 9999;
      }
      .app-container, .cart-bar, .modal {
        display: none !important;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>久久家烧烤</h1>
    <div class="sub">🔥 炭火现烤 · 扫码点餐</div>
  </div>

  <!-- 分类切换 -->
  <div class="category-nav">
    <button class="cat-btn active" data-cat="meat">🥩 肉类</button>
    <button class="cat-btn" data-cat="veg">🥬 蔬菜</button>
    <button class="cat-btn" data-cat="staple">🍚 主食</button>
  </div>

  <!-- 菜单容器 -->
  <div class="menu-list" id="menuContainer"></div>

  <!-- 底部购物车 -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-summary" id="cartToggle">
      <div class="cart-icon-wrap">
        🛒
        <span class="badge" id="cartCount">0</span>
      </div>
      <span class="total-price" id="totalPrice">¥0.00</span>
    </div>
    <div class="cart-actions">
      <button class="action-btn" id="clearCartBtn">清空</button>
      <button class="action-btn order-btn" id="submitOrderBtn">下单</button>
    </div>
  </div>
</div>

<!-- 购物车详情弹窗 -->
<div class="modal" id="cartModal">
  <div class="modal-content">
    <div class="modal-title">
      <span>🧾 已选菜品</span>
      <span id="modalClose" style="cursor:pointer;">✕</span>
    </div>
    <div id="cartDetailList"></div>
    <div style="text-align:right; margin-top:10px; color:#ffae42; font-weight:bold;" id="modalTotal"></div>
    <div class="modal-footer">
      <button class="close-modal" id="modalClear">清空</button>
      <button class="close-modal" style="background:#e07b20; color:#000;" id="modalOrder">确认下单</button>
    </div>
  </div>
</div>

<!-- 打印订单区域（隐藏） -->
<div class="print-order" id="printOrderArea"></div>

<script>
  (function() {
    // ---------- 菜单数据 ----------
    const menuData = {
      meat: [
        { id: 'p1', name: '大串猪肉', price: 1.00 },
        { id: 'p2', name: '鲜切羊肉', price: 3.00 },
        { id: 'p3', name: '香辣梅肉', price: 2.00 },
        { id: 'p4', name: '猪脆骨', price: 2.50 },
        { id: 'p5', name: '蒜瓣肉', price: 2.00 },
        { id: 'p6', name: '望京小腰', price: 3.00 },
        { id: 'p7', name: '鱼豆腐', price: 2.00 },
        { id: 'p8', name: '掌中宝', price: 3.00 },
        { id: 'p9', name: '烤肠', price: 2.00 },
        { id: 'p10', name: '牛心管', price: 2.00 },
        { id: 'p11', name: '烤鱿鱼', price: 8.00 },
        { id: 'p12', name: '烤翅中（大）', price: 7.00 },
        { id: 'p13', name: '多味鱼', price: 4.00 },
        { id: 'p14', name: '碳烤猪皮', price: 1.00 }
      ],
      veg: [
        { id: 'v1', name: '烤韭菜', price: 10.00 },
        { id: 'v2', name: '烤豆干', price: 1.00 },
        { id: 'v3', name: '烤辣椒', price: 1.00 },
        { id: 'v4', name: '烤面筋', price: 2.00 },
        { id: 'v5', name: '烤包菜', price: 10.00 },
        { id: 'v6', name: '烤金针菇', price: 10.00 },
        { id: 'v7', name: '卤花生', price: 8.00 }
      ],
      staple: [
        { id: 's1', name: '烤馒头', price: 1.00 }
      ]
    };

    // 状态
    let currentCategory = 'meat';
    // 购物车: Map<id, { name, price, quantity }>
    let cart = new Map();

    // DOM元素
    const menuContainer = document.getElementById('menuContainer');
    const catButtons = document.querySelectorAll('.cat-btn');
    const cartCountSpan = document.getElementById('cartCount');
    const totalPriceSpan = document.getElementById('totalPrice');
    const cartToggle = document.getElementById('cartToggle');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const submitOrderBtn = document.getElementById('submitOrderBtn');
    const cartModal = document.getElementById('cartModal');
    const modalClose = document.getElementById('modalClose');
    const cartDetailList = document.getElementById('cartDetailList');
    const modalTotal = document.getElementById('modalTotal');
    const modalClear = document.getElementById('modalClear');
    const modalOrder = document.getElementById('modalOrder');
    const printOrderArea = document.getElementById('printOrderArea');

    // 渲染菜单
    function renderMenu(category) {
      const items = menuData[category] || [];
      let html = '';
      items.forEach(item => {
        const cartItem = cart.get(item.id);
        const qty = cartItem ? cartItem.quantity : 0;
        html += `
          <div class="menu-item" data-id="${item.id}">
            <div class="item-info">
              <span class="item-name">${item.name}</span>
              <span class="item-price"><span class="price-symbol">¥</span>${item.price.toFixed(2)}</span>
            </div>
            <div class="quantity-control">
              <button class="qty-btn decrease" data-id="${item.id}">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn increase" data-id="${item.id}">+</button>
            </div>
          </div>
        `;
      });
      menuContainer.innerHTML = html;
      // 绑定加减事件
      document.querySelectorAll('.increase').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          changeQuantity(id, 1);
        });
      });
      document.querySelectorAll('.decrease').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          changeQuantity(id, -1);
        });
      });
    }

    // 查找菜品信息
    function findItemById(id) {
      for (let cat of ['meat', 'veg', 'staple']) {
        const found = menuData[cat].find(item => item.id === id);
        if (found) return found;
      }
      return null;
    }

    // 修改数量
    function changeQuantity(id, delta) {
      const itemInfo = findItemById(id);
      if (!itemInfo) return;
      let cartItem = cart.get(id);
      if (!cartItem) {
        if (delta > 0) {
          cart.set(id, { name: itemInfo.name, price: itemInfo.price, quantity: 1 });
        } else {
          return; // 没有则不能减
        }
      } else {
        const newQty = cartItem.quantity + delta;
        if (newQty <= 0) {
          cart.delete(id);
        } else {
          cartItem.quantity = newQty;
        }
      }
      updateUI();
      renderMenu(currentCategory); // 刷新当前分类数量显示
    }

    // 更新购物车UI
    function updateUI() {
      let totalCount = 0;
      let totalPrice = 0;
      cart.forEach(item => {
        totalCount += item.quantity;
        totalPrice += item.price * item.quantity;
      });
      cartCountSpan.textContent = totalCount;
      totalPriceSpan.textContent = '¥' + totalPrice.toFixed(2);
    }

    // 清空购物车
    function clearCart() {
      cart.clear();
      updateUI();
      renderMenu(currentCategory);
      cartModal.classList.remove('active');
    }

    // 渲染购物车弹窗内容
    function renderCartModal() {
      if (cart.size === 0) {
        cartDetailList.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">购物车空空如也～</p>';
        modalTotal.textContent = '';
        return;
      }
      let html = '';
      let total = 0;
      cart.forEach((item, id) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        html += `
          <div class="cart-item-row">
            <span>${item.name} x${item.quantity}</span>
            <span>¥${subtotal.toFixed(2)} <span class="remove-item" data-id="${id}">🗑️</span></span>
          </div>
        `;
      });
      cartDetailList.innerHTML = html;
      modalTotal.textContent = `合计：¥${total.toFixed(2)}`;
      // 绑定删除事件
      document.querySelectorAll('.remove-item').forEach(el => {
        el.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          cart.delete(id);
          updateUI();
          renderMenu(currentCategory);
          renderCartModal();
          if (cart.size === 0) {
            cartModal.classList.remove('active');
          }
        });
      });
    }

    // 打开购物车弹窗
    function openCartModal() {
      renderCartModal();
      cartModal.classList.add('active');
    }

    // 关闭弹窗
    function closeCartModal() {
      cartModal.classList.remove('active');
    }

    // 生成订单并打印
    function placeOrder() {
      if (cart.size === 0) {
        alert('请先选择菜品！');
        return;
      }
      // 生成订单内容
      let orderHtml = `
        <div style="text-align:center; font-weight:bold; font-size:20px; margin-bottom:10px;">久久家烧烤</div>
        <div style="text-align:center; margin-bottom:16px;">📋 订单一览</div>
        <div style="border-bottom:2px dashed #000; margin-bottom:10px;"></div>
      `;
      let total = 0;
      let orderNumber = 'JJ' + Date.now().toString().slice(-6);
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        orderHtml += `<div style="display:flex; justify-content:space-between; margin:6px 0;"><span>${item.name} x${item.quantity}</span><span>¥${subtotal.toFixed(2)}</span></div>`;
      });
      orderHtml += `<div style="border-top:2px dashed #000; margin-top:10px; padding-top:6px; display:flex; justify-content:space-between; font-weight:bold;"><span>合计</span><span>¥${total.toFixed(2)}</span></div>`;
      orderHtml += `<div style="margin-top:16px; text-align:center; color:#555;">下单时间：${new Date().toLocaleString()}<br>单号：${orderNumber}</div>`;
      orderHtml += `<div style="text-align:center; margin-top:18px; font-weight:bold;">🧑‍🍳 厨房已自动接单，请稍候</div>`;

      printOrderArea.innerHTML = orderHtml;
      // 触发打印 (自动打出订单)
      window.print();
      // 打印后清空购物车（模拟下单成功）
      cart.clear();
      updateUI();
      renderMenu(currentCategory);
      closeCartModal();
    }

    // 事件绑定
    catButtons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        catButtons.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.getAttribute('data-cat');
        renderMenu(currentCategory);
      });
    });

    cartToggle.addEventListener('click', openCartModal);
    modalClose.addEventListener('click', closeCartModal);
    clearCartBtn.addEventListener('click', clearCart);
    submitOrderBtn.addEventListener('click', placeOrder);
    modalClear.addEventListener('click', clearCart);
    modalOrder.addEventListener('click', () => {
      closeCartModal();
      placeOrder();
    });

    // 点击模态框背景关闭
    cartModal.addEventListener('click', function(e) {
      if (e.target === cartModal) closeCartModal();
    });

    // 初始化渲染
    renderMenu('meat');
    updateUI();
  })();
</script>
</body>
</html>
