<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>久久家一元烧烤 · 扫码点餐</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f8f8f8; max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #c0392b; color: white; padding: 12px 18px; text-align: center; border-radius: 0 0 12px 12px; flex-shrink: 0; }
    .header h1 { font-size: 24px; }
    .hint-bar { background: #fff3cd; padding: 6px 12px; font-size: 12px; }
    .table-row { display: flex; align-items: center; padding: 8px 12px; background: white; position: relative; }
    .table-big-btn { width: 60px; height: 60px; background: white; border: 2px solid #c0392b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #c0392b; cursor: pointer; margin-right: 10px; }
    .table-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 10px; gap: 6px; z-index: 100; }
    .table-dropdown.open { display: flex; flex-wrap: wrap; }
    .table-opt-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 8px 12px; border-radius: 12px; font-size: 16px; cursor: pointer; }
    .main-container { display: flex; flex: 1; overflow: hidden; }
    .left-categories { width: 80px; background: white; border-right: 1px solid #eee; overflow-y: auto; }
    .left-categories button { display: block; width: 100%; background: white; border: none; padding: 12px 4px; font-size: 13px; cursor: pointer; }
    .left-categories button.active { background: #c0392b; color: white; font-weight: bold; }
    .right-content { flex: 1; display: flex; flex-direction: column; }
    .menu-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .menu-item { display: flex; background: white; border-radius: 12px; padding: 10px; margin-bottom: 10px; align-items: flex-start; }
    .menu-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 10px; background: #eee; }
    .item-info { flex: 1; }
    .item-name { font-size: 16px; font-weight: bold; }
    .item-price { color: #c0392b; font-weight: bold; }
    .taste-row { display: flex; gap: 6px; margin-top: 4px; }
    .taste-tag { background: #f0f0f0; border: 1px solid #ddd; padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; }
    .taste-tag.selected { background: #ffe5e5; border-color: #c0392b; color: #c0392b; font-weight: bold; }
    .qty-row { display: flex; align-items: center; margin-top: 4px; }
    .qty-num { font-size: 14px; min-width: 18px; text-align: center; cursor: pointer; border-bottom: 1px dashed #aaa; margin-left: 4px; }
    .stepper { display: flex; align-items: center; }
    .stepper-btn { background: #fff5f5; border: 1px solid #e0a0a0; color: #c0392b; padding: 4px 10px; font-size: 13px; cursor: pointer; }
    .stepper-val { background: #fff; border-top: 1px solid #e0a0a0; border-bottom: 1px solid #e0a0a0; padding: 4px 6px; font-weight: bold; }
    .cart-bar { background: white; box-shadow: 0 -2px 6px rgba(0,0,0,0.08); padding: 10px 12px; display: flex; justify-content: space-between; }
    .submit-btn { background: #c0392b; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-size: 15px; cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 16px; width: 90%; max-width: 400px; padding: 20px; }
    .modal-table-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .modal-table-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 6px 12px; border-radius: 12px; cursor: pointer; }
    .modal-table-btn.selected { background: #c0392b; color: white; }
  </style>
</head>
<body>
<div id="customerView" style="display:flex; flex-direction:column; height:100vh;">
  <div class="header"><h1>久久家一元烧烤</h1><p>扫码点餐</p></div>
  <div class="hint-bar">选桌 → 选口味 → 步进器调数量 → 下单</div>
  <div class="table-row">
    <div class="table-big-btn" onclick="document.getElementById('tableDropdown').classList.toggle('open')">
      <span id="tableBigText">选桌</span>
    </div>
    <div class="table-dropdown" id="tableDropdown">
      <button class="table-opt-btn" onclick="setCustomerTable('')">无桌</button>
      <script>
        for (let i = 1; i <= 10; i++) document.write('<button class="table-opt-btn" onclick="setCustomerTable('+i+')">'+i+'号</button>');
      </script>
    </div>
    <div style="flex:1; text-align:right;">
      <button class="submit-btn" onclick="showConfirmModal()">下单</button>
    </div>
  </div>
  <div class="main-container">
    <div class="left-categories" id="leftCategories">
      <button class="active" onclick="filterCategory('all', event)">全部</button>
      <button onclick="filterCategory('meat', event)">肉类</button>
      <button onclick="filterCategory('veg', event)">蔬菜</button>
      <button onclick="filterCategory('seafood', event)">海鲜</button>
      <button onclick="filterCategory('noodle', event)">面食</button>
      <button onclick="filterCategory('drink', event)">饮品</button>
      <button onclick="filterCategory('other', event)">其他</button>
    </div>
    <div class="right-content">
      <div class="menu-scroll" id="menuScroll"><div id="menuContainer"></div></div>
      <div class="cart-bar">
        <div>已选 <span id="cartCount">0</span> 件 | 合计 ¥<span id="cartTotal">0.00</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== Firebase ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDFCN5ttr5w3xM8n3eeqndZBHNKaWGfG-0",
    authDomain: "jiujiukaorou-53a3d.firebaseapp.com",
    databaseURL: "https://jiujiukaorou-53a3d-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jiujiukaorou-53a3d",
    storageBucket: "jiujiukaorou-53a3d.firebasestorage.app",
    messagingSenderId: "499822532464",
    appId: "1:499822532464:web:93d49aba6e5b3d524761b5"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const ordersRef = database.ref('orders');

  // ==================== 固定菜单 ====================
  const menu = [
    { id:1, name:"大串猪肉", price:1, category:"meat", unit:"串" },
    { id:2, name:"鲜切羊肉", price:3, category:"meat", unit:"串" },
    { id:3, name:"鸡翅尖", price:1.5, category:"meat", unit:"串" },
    { id:4, name:"猪脆骨", price:2.5, category:"meat", unit:"串" },
    { id:5, name:"蒜瓣肉", price:2, category:"meat", unit:"串" },
    { id:6, name:"望京小腰", price:3, category:"meat", unit:"串" },
    { id:7, name:"鱼豆腐", price:2, category:"meat", unit:"串" },
    { id:8, name:"掌中宝", price:3, category:"meat", unit:"串" },
    { id:9, name:"烤肠", price:2, category:"meat", unit:"串" },
    { id:10, name:"牛心管", price:3, category:"meat", unit:"串" },
    { id:11, name:"烤鸡翅中", price:7, category:"meat", unit:"串" },
    { id:13, name:"碳烤猪皮", price:1, category:"meat", unit:"串" },
    { id:14, name:"烤面筋", price:2, category:"noodle", unit:"串" },
    { id:15, name:"烤鱿鱼", price:8, category:"seafood", unit:"串" },
    { id:16, name:"烤韭菜", price:10, category:"veg", unit:"份" },
    { id:17, name:"烤豆干", price:1, category:"veg", unit:"串" },
    { id:18, name:"烤辣椒", price:1, category:"veg", unit:"串" },
    { id:19, name:"烤包菜", price:10, category:"veg", unit:"份" },
    { id:20, name:"烤金针菇", price:10, category:"veg", unit:"份" },
    { id:21, name:"烤馒头", price:1, category:"noodle", unit:"串" },
    { id:22, name:"卤花生", price:8, category:"other", unit:"份" },
    { id:23, name:"黄瓜拌面筋", price:16, category:"other", unit:"份" },
    { id:24, name:"青岛啤酒", price:8, category:"drink", unit:"瓶" },
    { id:25, name:"大窑", price:5, category:"drink", unit:"瓶" },
    { id:26, name:"京8啤酒", price:8, category:"drink", unit:"瓶" },
    { id:27, name:"崂山啤酒", price:6, category:"drink", unit:"瓶" },
    { id:28, name:"烤马步鱼", price:4, category:"seafood", unit:"串" },
    { id:29, name:"雪碧", price:3, category:"drink", unit:"瓶" }
  ];

  const tasteOptions = ['孜然', '辣'];
  let cart = {};                // { itemId: { '孜然': qty, '辣': qty } }
  let currentSpicy = '辣';      // 当前选中口味
  let customerTable = '';
  let currentFilter = 'all';

  // ==================== 初始化 ====================
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('table')) {
    const t = urlParams.get('table');
    if (t && !isNaN(t) && t >= 1 && t <= 10) customerTable = t;
    else if (t === '0' || t === 'none') customerTable = '';
    updateTableDisplay();
  }
  renderMenu('all');

  // ==================== 桌号 ====================
  function setCustomerTable(num) {
    customerTable = num;
    updateTableDisplay();
    document.getElementById('tableDropdown').classList.remove('open');
  }
  function updateTableDisplay() {
    const text = document.getElementById('tableBigText');
    text.innerText = customerTable === '' ? '选桌' : customerTable;
  }

  // ==================== 分类 ====================
  function filterCategory(cat, e) {
    document.querySelectorAll('#leftCategories button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = cat;
    renderMenu(cat);
  }

  // ==================== 渲染菜单 ====================
  function renderMenu(filter = 'all') {
    const container = document.getElementById('menuContainer');
    const items = filter === 'all' ? menu : menu.filter(m => m.category === filter);
    let html = '';
    items.forEach(item => {
      const itemCart = cart[item.id] || {};
      const total = (itemCart['孜然'] || 0) + (itemCart['辣'] || 0);
      const unit = item.unit || '串';

      // 口味标签
      let tasteHtml = tasteOptions.map(opt => {
        const qty = itemCart[opt] || 0;
        const sel = opt === currentSpicy ? ' selected' : '';
        return `<span class="taste-tag${sel}" onclick="selectSpicy('${opt}')">${opt} ${qty}</span>`;
      }).join('');

      // 步进器
      let stepperHtml = '';
      if (item.price < 6) {
        stepperHtml = `
          <div class="stepper" style="margin-top:4px;">
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, -1)">-1</button>
            <span class="stepper-val">1${unit}</span>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 1)">+1</button>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, -5)">-5</button>
            <span class="stepper-val">5${unit}</span>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 5)">+5</button>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, -10)">-10</button>
            <span class="stepper-val">10${unit}</span>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 10)">+10</button>
          </div>
          <div style="margin-top:2px;">
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 20)">+20${unit}</button>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 30)">+30${unit}</button>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 40)">+40${unit}</button>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 50)">+50${unit}</button>
          </div>`;
      } else {
        stepperHtml = `
          <div class="stepper" style="margin-top:4px;">
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, -1)">-1</button>
            <span class="stepper-val">1${unit}</span>
            <button class="stepper-btn" onclick="quickAdjust(${item.id}, 1)">+1</button>
          </div>`;
      }

      html += `
        <div class="menu-item">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">¥${item.price}</div>
            <div class="taste-row">${tasteHtml}</div>
            <div class="qty-row">
              <span class="qty-num">${total}</span> ${unit}
            </div>
            ${stepperHtml}
          </div>
        </div>`;
    });
    container.innerHTML = html;
    updateCartBar();
  }

  // ==================== 口味选择 ====================
  function selectSpicy(level) {
    currentSpicy = level;
    renderMenu(currentFilter);
  }

  // ==================== 数量调整 ====================
  function quickAdjust(itemId, delta) {
    if (!cart[itemId]) cart[itemId] = {};
    const key = currentSpicy;
    cart[itemId][key] = (cart[itemId][key] || 0) + delta;
    if (cart[itemId][key] < 0) cart[itemId][key] = 0;
    if (Object.values(cart[itemId]).reduce((a,b) => a+b, 0) === 0) delete cart[itemId];
    renderMenu(currentFilter);
  }

  // ==================== 更新底部栏 ====================
  function updateCartBar() {
    let totalCount = 0, totalPrice = 0;
    Object.entries(cart).forEach(([itemId, levels]) => {
      const item = menu.find(m => m.id == itemId);
      if (item) {
        Object.values(levels).forEach(qty => {
          totalCount += qty;
          totalPrice += item.price * qty;
        });
      }
    });
    document.getElementById('cartCount').innerText = totalCount;
    document.getElementById('cartTotal').innerText = totalPrice.toFixed(2);
  }

  // ==================== 下单确认 ====================
  function showConfirmModal() {
    const items = [];
    Object.entries(cart).forEach(([itemId, levels]) => {
      const item = menu.find(m => m.id == itemId);
      if (item) {
        Object.entries(levels).forEach(([taste, qty]) => {
          if (qty > 0) items.push({ name: item.name, price: item.price, qty, spicy: taste, subtotal: item.price * qty });
        });
      }
    });
    if (items.length === 0) { alert('请先选择菜品'); return; }

    const total = items.reduce((sum, i) => sum + i.subtotal, 0).toFixed(2);
    let itemsHtml = items.map(i => `<div>${i.name} ${i.spicy} ×${i.qty} - ¥${i.subtotal.toFixed(2)}</div>`).join('');
    let tableBtns = '';
    for (let i = 1; i <= 10; i++) {
      tableBtns += `<button class="modal-table-btn${customerTable == i ? ' selected' : ''}" onclick="setTableFromModal(${i})">${i}号</button>`;
    }

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>确认订单</h3>
        ${itemsHtml}
        <hr>
        <div>合计：¥${total}</div>
        <div>桌号：</div>
        <div class="modal-table-btns">${tableBtns}</div>
        <div style="margin-top:10px;"><label>备注：</label><textarea id="remarkInput" rows="2" style="width:100%"></textarea></div>
        <div style="margin-top:10px;"><label><input type="checkbox" id="packCheckbox"> 打包</label></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">取消</button>
          <button class="btn-confirm" onclick="confirmOrder()">确认下单</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    window._currentModal = modal; // 用于关闭
  }

  function setTableFromModal(num) {
    customerTable = num;
    updateTableDisplay();
    // 更新弹窗内按钮样式
    const btns = document.querySelectorAll('.modal-table-btn');
    btns.forEach(b => b.classList.remove('selected'));
    const target = document.querySelector(`.modal-table-btn:nth-child(${num})`);
    if (target) target.classList.add('selected');
  }

  function confirmOrder() {
    const tableNumber = customerTable || '未选桌';
    const remark = document.getElementById('remarkInput')?.value.trim() || '';
    const isPack = document.getElementById('packCheckbox')?.checked ? '打包' : '堂食';
    const items = [];
    Object.entries(cart).forEach(([itemId, levels]) => {
      const item = menu.find(m => m.id == itemId);
      if (item) {
        Object.entries(levels).forEach(([taste, qty]) => {
          if (qty > 0) items.push({ name: item.name, price: item.price, qty, spicy: taste, subtotal: item.price * qty });
        });
      }
    });
    const total = items.reduce((sum, i) => sum + i.subtotal, 0).toFixed(2);
    const orderNumber = 'Y' + new Date().toISOString().replace(/\D/g, '').slice(2, 14) + Math.floor(Math.random() * 1000);
    const order = {
      time: new Date().toLocaleString(),
      table: tableNumber,
      orderNumber: orderNumber,
      isPack: isPack,
      remark: remark,
      items: items.map(i => ({ name: i.name, price: i.price, qty: i.qty, spicy: i.spicy, subtotal: i.subtotal })),
      total: total,
      settled: false,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    };
    ordersRef.push(order).then(() => {
      document.querySelector('.modal-overlay')?.remove();
      alert('下单成功！单号：' + orderNumber + '\n合计 ¥' + total);
      cart = {};
      renderMenu(currentFilter);
    }).catch(err => {
      alert('提交失败，请检查网络后重试');
      console.error(err);
    });
  }
</script>
</body>
</html>
