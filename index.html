      // 打印时替换“鱿”为“尤”
      let printName = item.name.replace(/鱿/g, '尤');
      const name = printName.padEnd(7, ' ');
      const qty = item.qty.toString().padStart(2, ' ');
      const subtotal = item.subtotal.toFixed(2).padStart(6, ' ');
      str += name + ' ' + qty + ' ' + subtotal + '\n';
      str += '  ' + item.spicy + '\n';
    });
    if (order.remark) { str += '----------------------------\n'; str += '备注：' + order.remark + '\n'; }
    str += '----------------------------\n'; str += '\x1B\x61\x02'; str += '合计：¥ ' + order.total + '\n';
    str += '\x1B\x61\x01'; str += '谢谢惠顾，欢迎再次光临\n'; str += '\n\n\n'; str += '\x1D\x56\x42\x00';
    return encodeGBK(str);
  }

  // GBK 编码表（保留之前正确的孜等，尤字编码 D3C8）
  const gbkMap = new Map([

    ['腐',[0xB8,0xAF]],['掌',[0xD5,0xC6]],['中',[0xD6,0xD0]],['宝',[0xB1,0xA6]],

    ['碳',[0xCC,0xBC]],['皮',[0xC6,0xA4]],['面',[0xC3,0xE6]],['筋',[0xBD,0xEE]],
    ['尤',[0xD3,0xC8]], // 尤字编码
    ['韭',[0xBE,0xC2]],['菜',[0xB2,0xCB]],['干',[0xB8,0xC9]],
    ['椒',[0xBD,0xB7]],['包',[0xB0,0xFC]],['金',[0xBD,0xF0]],['针',[0xD5,0xEB]],
    ['菇',[0xB9,0xBD]],['馒',[0xC2,0xF8]],['头',[0xCD,0xB7]],['卤',[0xC2,0xB1]],
    ['花',[0xBB,0xA8]],['生',[0xC9,0xFA]],['黄',[0xBB,0xC6]],['瓜',[0xB9,0xCF]],

    ['单',[0xB5,0xA5]],['请',[0xC7,0xEB]],['及',[0xBC,0xB0]],['处',[0xB4,0xA6]],
    ['理',[0xC0,0xED]],['：',[0xA3,0xBA]],['。',[0xA1,0xA3]],['，',[0xA1,0xA2]],
    ['盐',[0xD1,0xCE]],['少',[0xC9,0xD9]],['注',[0xD7,0xA2]]
  ]);

  function encodeGBK(str) {
    const bytes = [];
    for (let c of str) {
      const code = c.charCodeAt(0);
      if (code <= 0x7F) bytes.push(code);
      else { const gbk = gbkMap.get(c); if (gbk) bytes.push(gbk[0], gbk[1]); else bytes.push(0x20); }
    }
    return new Uint8Array(bytes);
  }
