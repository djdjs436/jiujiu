<body>
<div id="customerView" style="display:flex; flex-direction:column; height:100vh;">

    <div class="table-dropdown" id="tableDropdown">
      <button class="table-opt-btn" onclick="setCustomerTable('', true)">无桌</button>
      <script>for(let i=1;i<=10;i++) document.write('<button class="table-opt-btn" onclick="setCustomerTable('+i+', true)">'+i+'号</button>');</script>
    </div>
    <div style="flex:1; text-align:right;"><button class="submit-btn" onclick="showConfirmModal()">下单</button></div>
  </div>
  <div class="main-container">
    <div class="left-categories" id="leftCategories">
      <button class="active" onclick="filterCategory('all', event)">全部</button>
      <button onclick="filterCategory('meat', event)">🥩肉类</button>
      <button onclick="filterCategory('veg', event)">🥬蔬菜</button>
      <button onclick="filterCategory('seafood', event)">🦐海鲜</button>
      <button onclick="filterCategory('noodle', event)">🍜面食</button>
      <button onclick="filterCategory('drink', event)">🥤饮品</button>
      <button onclick="filterCategory('other', event)">🥜其他</button>
    </div>
    <div class="right-content"><div class="menu-scroll"><div class="menu-list" id="menuContainer"></div></div>
      <div class="cart-bar"><div class="cart-info">已选 <span id="cartCount">0</span> 件 | 合计 <span class="cart-total" id="cartTotal">0.00</span> 元</div></div>
    </div>
  </div>
  <div class="admin-link"><a href="?admin">🔐 店家管理</a></div>
</div>

<div id="adminPanel" style="display:none;">
  <h3 style="margin-bottom:15px;">📋 实时订单（自动接收）</h3>
  <button id="connectPrinterBtn" class="bluetooth-btn" onclick="connectBluetoothPrinter()">🖨️ 连接蓝牙打印机</button>
  <div id="printerStatus" class="status">打印机未连接</div>
  <button class="admin-order-btn" onclick="showAdminOrderPanel()">📝 代客点餐</button>
  <button class="price-mgr-btn" onclick="showPriceManager()">💲 菜品价格管理</button>
  <button class="menu-mgr-btn" onclick="showMenuManager()">📋 菜品名称管理</button>
  <button class="stat-btn" onclick="showStatistics()">📊 统计与预备</button>
  <button class="gbk-btn" onclick="showGBKManager()">🔤 补充GBK编码</button>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="输入单号搜索" oninput="searchOrders()">
    <button onclick="searchOrders()">搜索</button>
  </div>
  <div class="table-nav" id="tableNav"><button class="active" onclick="filterTable('all', event)">全部</button></div>
  <div id="tableTotal" style="margin-bottom:10px; font-weight:bold; color:#c0392b;"></div>
  <button class="clear-btn" onclick="clearOrders()">清空已完成订单</button>
  <button class="settle-btn" id="settleTableBtn" onclick="settleCurrentTable()">结算当前桌</button>
  <div id="orderList"></div>
</div>

<div id="adminOrderPanel" style="display:none;">

    <div class="left-categories" id="adminLeftCategories">
      <button class="back-btn" onclick="hideAdminOrderPanel()">🔙 返回管理</button>

      <button onclick="filterAdminCategory('seafood', event)">🦐海鲜</button>
      <button onclick="filterAdminCategory('noodle', event)">🍜面食</button>
      <button onclick="filterAdminCategory('drink', event)">🥤饮品</button>
      <button onclick="filterAdminCategory('other', event)">🥜其他</button>

    ['理',[0xC0,0xED]],['：',[0xA3,0xBA]],['。',[0xA1,0xA3]],['，',[0xA1,0xA2]],
    ['盐',[0xD1,0xCE]],['少',[0xC9,0xD9]],['注',[0xD7,0xA2]]
  ]);

  let customGBKMap = new Map();
  customGBKRef.on('value', (snap) => {
    customGBKMap.clear();
    const data = snap.val();
    if (data) {
      Object.entries(data).forEach(([char, bytes]) => {
        customGBKMap.set(char, bytes);
      });
    }
  });

  function encodeGBK(str) {
    const bytes = [];
    for (let c of str) {
      const code = c.charCodeAt(0);
      if (code <= 0x7F) { bytes.push(code); continue; }
      const custom = customGBKMap.get(c);
      if (custom) { bytes.push(custom[0], custom[1]); continue; }
      const gbk = gbkMap.get(c);
      if (gbk) bytes.push(gbk[0], gbk[1]);
      else bytes.push(0x20);
    }
    return new Uint8Array(bytes);
  }

  function quickAdjust(itemId, delta, type = 'guest') {
    const cartObj = type === 'admin' ? adminCart : cart;
    const curSpicy = type === 'admin' ? adminCurrentSpicy : currentSpicy;
    if (!cartObj[itemId]) cartObj[itemId] = {};
    if (delta > 0) cartObj[itemId][curSpicy] = (cartObj[itemId][curSpicy] || 0) + delta;
    else { let current = cartObj[itemId][curSpicy] || 0; let remove = Math.min(current, -delta); cartObj[itemId][curSpicy] = current - remove; if (cartObj[itemId][curSpicy] === 0) delete cartObj[itemId][curSpicy]; }
    if (Object.keys(cartObj[itemId]).length === 0) delete cartObj[itemId];
    if (type === 'admin') renderAdminMenu(); else renderMenu(currentFilter);
  }

  function generateOrderNumber() {
    const now = new Date();
    const dateStr = now.getFullYear().toString().slice(-2) + ('0' + (now.getMonth() + 1)).slice(-2) + ('0' + now.getDate()).slice(-2);
    const timeStr = ('0' + now.getHours()).slice(-2) + ('0' + now.getMinutes()).slice(-2) + ('0' + now.getSeconds()).slice(-2);
    const rand = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
    return 'Y' + dateStr + '-' + timeStr + rand;
  }

    });
    html += '</div><button onclick="addEditItem()" style="margin-top:5px;">+ 添加菜品</button></div>';
    html += `<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('editOrderModal').remove()">取消</button><button class="btn-confirm" onclick="saveOrderEdit()">保存修改</button></div></div></div>`;

  function updateEditItem(input, idx, field) {
    const val = field === 'qty' ? parseInt(input.value) : input.value;
    window.editOrderData[idx][field] = val;
    if (field === 'name' || field === 'qty') {
      const menuItem = menu.find(m => m.name === window.editOrderData[idx].name);
      const price = menuItem ? menuItem.price : (window.editOrderData[idx].price || 0);
      window.editOrderData[idx].price = price;
      window.editOrderData[idx].subtotal = price * window.editOrderData[idx].qty;
    }
  }

  async function saveOrderEdit() {
    const key = window.editOrderKey;
    const newItems = window.editOrderData.map(item => {
      const menuItem = menu.find(m => m.name === item.name);
      const price = menuItem ? menuItem.price : (item.price || 0);
      const qty = parseInt(item.qty) || 0;
      return { name: item.name, price: price, qty: qty, spicy: item.spicy, subtotal: price * qty };
    }).filter(i => i.qty > 0);
    const total = newItems.reduce((sum,i)=>sum+i.subtotal,0).toFixed(2);
    const table = document.getElementById('editTable').value;
    const isPack = document.getElementById('editPack').checked ? '打包' : '堂食';
    const remark = document.getElementById('editRemark').value;
    await ordersRef.child(key).update({ table, isPack, remark, items: newItems, total });
    document.getElementById('editOrderModal').remove();
    alert('订单已更新');
  }

  // ================== 菜品名称管理 ==================
  function showMenuManager() {
    let html = `<div class="modal-overlay" id="menuManagerModal"><div class="modal-content" style="max-width:450px;"><div class="modal-title">📋 菜品管理</div>`;
    menu.forEach(item => {
      html += `<div class="price-edit-row"><input type="text" id="menuName_${item.id}" value="${item.name}" style="width:120px"><input type="number" step="0.1" id="menuPrice_${item.id}" value="${item.price}" style="width:60px"><select id="menuCat_${item.id}">${['meat','veg','seafood','noodle','drink','other'].map(c=>`<option value="${c}" ${item.category===c?'selected':''}>${c}</option>`).join('')}</select><button onclick="deleteMenuItem(${item.id})" style="background:#e74c3c; color:white; border:none; padding:4px 8px; border-radius:8px;">删除</button></div>`;
    });
    html += '<button onclick="addNewMenuItem()" style="margin:10px 0;">+ 添加新菜品</button>';
    html += `<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('menuManagerModal').remove()">取消</button><button class="btn-confirm" onclick="saveMenuChanges()">保存</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
  }

  function addNewMenuItem() {
    const newId = menu.length > 0 ? Math.max(...menu.map(m=>m.id)) + 1 : 1;
    menu.push({ id: newId, name: "新菜品", price: 0, category: "meat", unit: "串", img: "https://placehold.co/150x150/eee/999?text=新" });
    document.getElementById('menuManagerModal').remove();
    showMenuManager();
  }

  function deleteMenuItem(id) {
    if (confirm('确定删除此菜品？')) {
      menu = menu.filter(m => m.id !== id);
      document.getElementById('menuManagerModal').remove();
      showMenuManager();
    }
  }

  async function saveMenuChanges() {
    const updates = {};
    menu.forEach(item => {
      const nameInput = document.getElementById('menuName_' + item.id);
      const priceInput = document.getElementById('menuPrice_' + item.id);
      const catSelect = document.getElementById('menuCat_' + item.id);
      if (nameInput && priceInput && catSelect) {
        updates[item.id] = { id: item.id, name: nameInput.value, price: parseFloat(priceInput.value) || 0, category: catSelect.value, unit: item.unit, img: item.img };
      }
    });
    await menuItemsRef.set(updates);
    document.getElementById('menuManagerModal').remove();
    alert('菜品已更新');
  }

  // ================== 统计与预备（优化版） ==================
  async function showStatistics() {
    try {
      const today = new Date().toLocaleDateString();
      // 获取预备数据
      let prepData = {};
      try {
        const prepSnap = await dailyPrepRef.child(today).once('value');
        prepData = prepSnap.val() || {};
      } catch (e) {
        console.warn('预备数据读取失败，使用空数据', e);
      }

      let html = `<div class="modal-overlay" id="statModal"><div class="modal-content" style="max-width:450px;"><div class="modal-title">📊 今日统计 (${today})</div>`;
      html += '<div style="margin-bottom:10px;"><strong>预备数量设置</strong></div>';
      menu.forEach(item => {
        const prepQty = prepData[item.id] || 0;
        html += `<div class="stat-row"><span>${item.name}</span><input type="number" id="prep_${item.id}" value="${prepQty}" min="0" style="width:60px"></div>`;
      });
      html += '<button class="btn-confirm" onclick="savePrep()" style="margin:10px 0; width:100%;">保存预备数量</button>';

      // 计算今日销售额
      let totalAmount = 0;
      const soldMap = {};
      if (allOrders && allOrders.length > 0) {
        const todayOrders = allOrders.filter(o => o.timestamp && new Date(o.timestamp).toLocaleDateString() === today);
        todayOrders.forEach(order => {
          totalAmount += parseFloat(order.total) || 0;
          order.items.forEach(item => {
            if (!soldMap[item.name]) soldMap[item.name] = 0;
            soldMap[item.name] += item.qty || 0;
          });
        });
      }
      html += `<div style="margin-top:15px;"><strong>今日销售总额：¥${totalAmount.toFixed(2)}</strong></div>`;
      html += '<div style="margin-top:10px;"><strong>剩余数量</strong></div>';
      menu.forEach(item => {
        const prep = prepData[item.id] || 0;
        const sold = soldMap[item.name] || 0;
        const left = prep - sold;
        html += `<div class="stat-row"><span>${item.name}</span><span>预备:${prep} 已售:${sold} 剩余:${left}</span></div>`;
      });
      html += `<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('statModal').remove()">关闭</button></div></div></div>`;
      document.body.insertAdjacentHTML('beforeend', html);
    } catch (err) {
      console.error('统计错误', err);
      alert('统计数据加载失败，请稍后重试。错误信息：' + err.message);
    }
  }

  async function savePrep() {
    const today = new Date().toLocaleDateString();
    const updates = {};
    menu.forEach(item => {
      const input = document.getElementById('prep_' + item.id);
      if (input) updates[item.id] = parseInt(input.value) || 0;
    });
    await dailyPrepRef.child(today).set(updates);
    document.getElementById('statModal').remove();
    alert('预备数量已保存');
  }

  // ================== GBK 管理 ==================
  function showGBKManager() {
    let html = `<div class="modal-overlay" id="gbkModal"><div class="modal-content" style="max-width:450px;"><div class="modal-title">🔤 自定义GBK编码管理</div><div style="margin-bottom:10px;">已添加的自定义编码：</div>`;
    if (customGBKMap.size === 0) html += '<p style="color:#999;">暂无自定义编码</p>';
    else customGBKMap.forEach((bytes, char) => { html += `<div class="gbk-row"><span>${char}</span><span>${bytes.map(b=>'0x'+b.toString(16).toUpperCase().padStart(2,'0')).join(', ')}</span><button onclick="deleteCustomGBK('${char}')" style="background:#e74c3c; color:white; border:none; padding:2px 8px; border-radius:8px;">删除</button></div>`; });
    html += `<div style="margin-top:15px;"><strong>添加新编码：</strong></div><div style="display:flex; gap:5px; margin:5px 0;"><input type="text" id="newGBKChar" placeholder="汉字" maxlength="1" style="width:50px;"><input type="text" id="newGBKByte1" placeholder="第一字节" style="width:60px;"><input type="text" id="newGBKByte2" placeholder="第二字节" style="width:60px;"><button onclick="addCustomGBK()" style="background:#27ae60; color:white; border:none; padding:4px 10px; border-radius:8px;">添加</button></div><p style="font-size:12px; color:#666;">第一/二字节请输入十六进制，如 B1、C6</p>`;
    html += `<div class="modal-actions"><button class="btn-cancel" onclick="document.getElementById('gbkModal').remove()">关闭</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
  }
  function addCustomGBK() {
    const char = document.getElementById('newGBKChar').value.trim();
    const byte1 = document.getElementById('newGBKByte1').value.trim();
    const byte2 = document.getElementById('newGBKByte2').value.trim();
    if (!char || !byte1 || !byte2) { alert('请填写完整'); return; }
    const code1 = parseInt(byte1, 16), code2 = parseInt(byte2, 16);
    if (isNaN(code1) || isNaN(code2)) { alert('字节格式错误'); return; }
    customGBKMap.set(char, [code1, code2]);
    customGBKRef.child(char).set([code1, code2]).then(() => { document.getElementById('gbkModal').remove(); showGBKManager(); }).catch(err => { alert('保存失败：'+err.message); customGBKMap.delete(char); });
  }
  function deleteCustomGBK(char) { if (confirm(`确定删除 “${char}” 的自定义编码吗？`)) { customGBKMap.delete(char); customGBKRef.child(char).remove().then(() => { document.getElementById('gbkModal').remove(); showGBKManager(); }); } }

  // ================== 订单管理 ==================
  let allOrders = [];
  function startListening() {
    ordersRef.off();
    ordersRef.on('child_added', (snapshot) => { const order = snapshot.val(); allOrders.unshift({ key: snapshot.key, ...order }); autoPrint(order); playNotification(); renderOrders(); });
    ordersRef.on('child_removed', (snapshot) => { allOrders = allOrders.filter(o => o.key !== snapshot.key); renderOrders(); });
    ordersRef.on('child_changed', (snapshot) => { const idx = allOrders.findIndex(o => o.key === snapshot.key); if (idx !== -1) allOrders[idx] = { key: snapshot.key, ...snapshot.val() }; renderOrders(); });
  }
  function filterTable(table, e) { document.querySelectorAll('#tableNav button').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentTableFilter = table; renderOrders(); }
  function searchOrders() { currentSearch = document.getElementById('searchInput').value.trim(); renderOrders(); }

  function renderOrders() {
    const list = document.getElementById('orderList'), settleBtn = document.getElementById('settleTableBtn'), tableTotalDiv = document.getElementById('tableTotal');
    let filtered = allOrders;
    if (currentTableFilter !== 'all') { filtered = filtered.filter(o => o.table == currentTableFilter); settleBtn.style.display = 'inline-block'; } else settleBtn.style.display = 'none';
    if (currentSearch) filtered = filtered.filter(o => o.orderNumber && o.orderNumber.includes(currentSearch));
    let tableTotal = 0; filtered.forEach(o => { if (!o.settled) tableTotal += parseFloat(o.total); });
    tableTotalDiv.innerText = currentTableFilter === 'all' ? '' : `桌号 ${currentTableFilter} 未结算总额：¥${tableTotal.toFixed(2)}`;
    if (filtered.length === 0) { list.innerHTML = '<p style="color:#999;">暂无订单</p>'; return; }
    let ordersHtml = '';
    filtered.forEach(order => {
      const settledClass = order.settled ? 'settled' : '';
      let itemsHtml = ''; order.items.forEach(i => itemsHtml += `<li>${i.name} ${i.spicy} ×${i.qty} - ¥${i.subtotal}</li>`);
      ordersHtml += `<div class="order-card ${settledClass}" id="order-${order.key}">
        <strong>🕒 ${order.time}</strong> | 🪑 ${order.table||'无'} | ${order.isPack||'堂食'} ${order.settled?' (已结算)':''}
        <br>单号：${order.orderNumber||'无'} ${order.remark ? '<br>备注：'+order.remark : ''}
        <br>合计 ¥${order.total}
        <ul style="margin:6px 0; padding-left:20px;">${itemsHtml}</ul>
        <button class="print-btn" onclick="reprint('${order.key}')">🖨️ 补打小票</button>
        <button style="background:#e74c3c;color:white;border:none;padding:4px 12px;border-radius:10px;font-size:12px;" onclick="deleteOrder('${order.key}')">删除</button>
        <button style="background:#f39c12;color:white;border:none;padding:4px 12px;border-radius:10px;font-size:12px;margin-left:4px;" onclick="editOrder('${order.key}')">修改</button>
      </div>`;
    });
    list.innerHTML = ordersHtml;
  }

  function settleCurrentTable() {
    if (currentTableFilter === 'all') return;
    const tableOrders = allOrders.filter(o => o.table == currentTableFilter && !o.settled);
    if (tableOrders.length === 0) { alert('该桌没有未结算订单'); return; }
    if (!confirm(`确定结算桌号 ${currentTableFilter} 的所有未结算订单吗？`)) return;
    let combinedItems = [], totalAmount = 0;
    tableOrders.forEach(order => { order.items.forEach(item => { combinedItems.push({ name: item.name, spicy: item.spicy, qty: item.qty, subtotal: item.subtotal }); totalAmount += item.subtotal; }); });
    const mergedOrder = { time: new Date().toLocaleString(), table: currentTableFilter, isPack: '堂食', items: combinedItems, total: totalAmount.toFixed(2) };
    autoPrint(mergedOrder);
    const updates = {}; tableOrders.forEach(order => { updates[order.key + '/settled'] = true; });
    ordersRef.update(updates).then(() => alert('已结算并打印汇总小票！'));
  }

  function deleteOrder(key) { if (confirm('确定删除此订单？')) ordersRef.child(key).remove(); }
  function clearOrders() { if (confirm('确定清空所有订单？')) ordersRef.remove(); }
  function reprint(key) { const order = allOrders.find(o => o.key === key); if (order) autoPrint(order); }

  function autoPrint(order) {
    if (bluetoothCharacteristic) { try { const cmd = build72mmESC(order); sendBluetoothData(cmd); } catch(e) { fallbackPrint(order); } }
    else fallbackPrint(order);
  }

  function fallbackPrint(order) {
    const w = window.open('', '_blank', 'width=320,height=400');
    if (!w) return;
    let html = '<html><head><title>久久家一元烧烤·新订单</title><style>@page{size:80mm auto;margin:0;}body{width:80mm;font-family:monospace;font-size:12px;padding:2mm;}h2{text-align:center;font-size:16px;}.line{border-top:1px dashed #000;margin:4px 0;}.right{text-align:right;}</style></head><body><h2>久久家一元烧烤</h2><p style="text-align:center;">'+order.time+'</p><p>单号：'+(order.orderNumber||'无')+'</p><p>桌号：'+(order.table||'无')+' | '+(order.isPack||'堂食')+'</p><div class="line"></div>';
    order.items.forEach(item => html += '<div>'+item.name+' '+item.spicy+' ×'+item.qty+' <span style="float:right;">¥'+item.subtotal+'</span></div><div class="line"></div>');
    if (order.remark) html += '<div>备注：'+order.remark+'</div><div class="line"></div>';
    html += '<h3 class="right">合计: ¥'+order.total+'</h3><p style="text-align:center;">新订单 - 请及时处理</p></body></html>';
    w.document.write(html); w.document.close(); w.focus(); w.print(); setTimeout(() => w.close(), 2000);
  }

  function build72mmESC(order) {
    let str = '\x1B\x40'; str += '\x1B\x61\x01'; str += '\x1B\x21\x30'; str += '久久家一元烧烤\n'; str += '\x1B\x21\x00';
    str += '----------------------------\n'; str += '\x1B\x61\x00';
    str += '时间：' + order.time + '\n'; str += '单号：' + (order.orderNumber || '无') + '\n';
    str += '\x1B\x45\x01\x1B\x21\x30'; str += '桌号：' + order.table + '  ' + order.isPack + '\n';
    str += '\x1B\x21\x00\x1B\x45\x00'; str += '----------------------------\n';
    str += '品名       数量  小计\n';
    order.items.forEach(item => {
      const name = item.name.padEnd(7, ' '); const qty = item.qty.toString().padStart(2, ' '); const subtotal = item.subtotal.toFixed(2).padStart(6, ' ');
      str += name + ' ' + qty + ' ' + subtotal + '\n';
      str += '  ' + item.spicy + '\n';
    });
    if (order.remark) { str += '----------------------------\n'; str += '备注：' + order.remark + '\n'; }
    str += '----------------------------\n'; str += '\x1B\x61\x02'; str += '合计：¥ ' + order.total + '\n';
    str += '\x1B\x61\x01'; str += '谢谢惠顾，欢迎再次光临\n'; str += '\n\n\n'; str += '\x1D\x56\x42\x00';
    return encodeGBK(str);
  }

  function playNotification() { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.type='square'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.15); }
  function hideAdmin() { window.location.href = window.location.pathname; }

  function showLoginForm() {
    document.getElementById('customerView').style.display = 'none'; document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminOrderPanel').style.display = 'none';
    document.body.insertAdjacentHTML('beforeend', '<div id="loginBox"><h3>🔐 店家登录</h3><input id="pwdInput" type="password" placeholder="请输入管理密码"><button onclick="checkPassword()">进入管理</button><p id="loginError"></p><a href="'+window.location.pathname+'" style="font-size:13px;color:#999;display:block;margin-top:10px;">返回点餐页</a></div>');
  }
  function checkPassword() {
    if (document.getElementById('pwdInput').value === ADMIN_PASSWORD) {
      document.getElementById('loginBox').remove(); document.getElementById('adminPanel').style.display = 'block';
      if (navigator.bluetooth) document.getElementById('connectPrinterBtn').style.display = 'inline-block';
      initTableNav(); startListening();
    } else document.getElementById('loginError').innerText = '密码错误，请重试';
  }
  function initTableNav() { const nav = document.getElementById('tableNav'); for (let i=1;i<=10;i++) { if (!nav.querySelector('button[data-table="'+i+'"]')) { const btn = document.createElement('button'); btn.setAttribute('data-table', i); btn.innerText = '🪑 '+i+'号桌'; btn.onclick = function(e) { filterTable(i, e); }; nav.appendChild(btn); } } }

  function updatePrinterStatus(text) { document.getElementById('printerStatus').innerText = text; }
  async function connectBluetoothPrinter() {
    try {
      updatePrinterStatus('正在搜索...');
      bluetoothDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] });
      updatePrinterStatus('正在连接...');
      const server = await bluetoothDevice.gatt.connect(); const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
      bluetoothCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
      updatePrinterStatus('✅ 已连接'); alert('蓝牙打印机已连接！');
      bluetoothDevice.addEventListener('gattserverdisconnected', () => { updatePrinterStatus('⚠️ 已断开'); bluetoothDevice = null; bluetoothCharacteristic = null; });
    } catch (error) { updatePrinterStatus('❌ 连接失败'); alert('连接失败，请确保打印机已开启并处于可发现状态。'); }
  }
  async function sendBluetoothData(data) {
    if (!bluetoothCharacteristic) throw new Error('未连接打印机');
    const chunkSize = 20; for (let i = 0; i < data.length; i += chunkSize) { await bluetoothCharacteristic.writeValue(data.slice(i, i + chunkSize)); }
  }
</script>
