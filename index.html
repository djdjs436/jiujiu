    // 由于回复长度限制，以上函数内容请直接使用上一版完整代码中的函数，或通过我提供的完整文件保证功能。

    // ========== 核心改动：蓝牙打印 + GBK 编码 ==========
    async function connectBluetoothPrinter() {
      try {
        bluetoothDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });
        const server = await bluetoothDevice.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        bluetoothCharacteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
        alert('蓝牙打印机已连接！');
        bluetoothDevice.addEventListener('gattserverdisconnected', () => {
          alert('打印机已断开');
          bluetoothDevice = null;
          bluetoothCharacteristic = null;
        });
      } catch (error) {
        console.error(error);
        alert('连接失败，请确保打印机已开启并处于可发现状态。');
      }
    }

    async function sendBluetoothData(data) {
      if (!bluetoothCharacteristic) throw new Error('打印机未连接');
      const chunkSize = 20;
      for (let i = 0; i < data.length; i += chunkSize) {
        await bluetoothCharacteristic.writeValue(data.slice(i, i + chunkSize));
      }
    }

    // 构建 72mm 热敏纸 ESC/POS 指令（GBK编码）
    function build72mmESC(order) {
      let str = '';
      // 初始化
      str += '\x1B\x40';
      // 居中
      str += '\x1B\x61\x01';
      // 放大标题
      str += '\x1B\x21\x30';
      str += '久久家烧烤\n';
      str += '\x1B\x21\x00';
      str += '--------------------------------\n';
      // 左对齐
      str += '\x1B\x61\x00';
      str += `时间：${order.time}\n`;
      str += `桌号：${order.table || '无'}  ${order.isPack || '堂食'}\n`;
      str += '--------------------------------\n';
      str += '品名        数量  小计\n';
      order.items.forEach(item => {
        // 每行32字符，中文占2个
        const name = item.name.padEnd(8, ' ');  // 8个中文字符宽度
        const qty = item.qty.toString().padStart(2, ' ');
        const subtotal = item.subtotal.toFixed(2).padStart(6, ' ');
        str += `${name} ${qty} ${subtotal}\n`;
        str += `  辣度: ${item.spicy}\n`;
      });
      str += '--------------------------------\n';
      str += '\x1B\x61\x02'; // 右对齐
      str += `合计：¥ ${order.total}\n`;
      str += '\x1B\x61\x01'; // 居中
      str += '谢谢惠顾，欢迎再次光临\n';
      str += '\n\n\n';
      // 切纸
      str += '\x1D\x56\x42\x00';

      // 使用 encoding.js 转换为 GBK 编码的 Uint8Array
      return new Uint8Array(Encoding.convert(str, 'GBK'));
    }

    // 自动打印：优先蓝牙，否则浏览器
    function autoPrint(order) {
      if (bluetoothCharacteristic) {
        const command = build72mmESC(order);
        sendBluetoothData(command).catch(err => {
          console.error('蓝牙打印失败:', err);
          fallbackPrint(order);
        });
      } else {
        fallbackPrint(order);
      }
    }

    // 备用浏览器打印（72mm适配）
    function fallbackPrint(order) {
      const w = window.open('', '_blank', 'width=300,height=400');
      if (!w) return;
      w.document.write(`
        <html>
        <head><title>久久家烧烤·新订单</title>

          .right { text-align: right; }
          .item { margin: 2px 0; }
        </style>
        </head>
        <body>
          <h2>久久家烧烤</h2>
          <p style="text-align:center;">${order.time}</p>
          <p>桌号：${order.table || '无'} | ${order.isPack || '堂食'}</p>
          <div class="line"></div>
          ${order.items.map(i => `<div class="item">${i.name} x${i.qty} <span style="float:right;">¥${i.subtotal}</span><br/><small>辣度:${i.spicy}</small></div>`).join('<div class="line"></div>')}
          <div class="line"></div>
          <h3 class="right">合计: ¥${order.total}</h3>
          <p style="text-align:center; margin-top:8px;">新订单 - 请及时处理</p>
        </body>
        </html>
      `);
      w.document.close();
      w.focus();
      w.print();
      setTimeout(() => w.close(), 2000);
    }
