<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>久久家烧烤 - 扫码点餐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 2px solid #e65c00;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.4em;
            color: #ff7b00;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255,123,0,0.5);
        }
        .header .sub {
            color: #ccc;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .menu-section {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .menu-section h2 {
            font-size: 1.3em;
            color: #ff9f40;
            border-left: 4px solid #ff7b00;
            padding-left: 12px;
            margin-bottom: 15px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid #3a3a3a;
        }
        .menu-item:last-child { border-bottom: none; }
        .item-info {
            flex: 1;
        }
        .item-name {
            font-size: 1.1em;
            font-weight: 500;
        }
        .item-price {
            color: #ff7b00;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 2px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quantity-control button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #ff7b00;
            color: white;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .quantity-control button:active { background: #e05a00; }
        .quantity-control button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .quantity-control .qty {
            font-size: 1.1em;
            min-width: 24px;
            text-align: center;
            font-weight: bold;
        }
        .cart-summary {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 18px;
            margin: 20px 0;
            position: sticky;
            bottom: 15px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.7);
        }
        .cart-total {
            font-size: 1.3em;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .cart-total span:last-child {
            color: #ff7b00;
            font-weight: bold;
            font-size: 1.4em;
        }
        #customerInfo {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        #customerInfo input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            background: #1a1a1a;
            color: white;
            font-size: 1em;
        }
        #customerInfo input::placeholder { color: #999; }
        #submitOrder {
            width: 100%;
            padding: 16px;
            background: #ff7b00;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #submitOrder:active { background: #e05a00; }
        #submitOrder:disabled { background: #777; }
        .empty-cart {
            text-align: center;
            color: #aaa;
            padding: 30px;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .success { background: #1e5f1e; color: #a0ffa0; }
        .error { background: #5f1e1e; color: #ffa0a0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 久久家烧烤</h1>
        <div class="sub">扫码点餐 · 新鲜现烤</div>
    </div>

    <!-- 肉类 -->
    <div class="menu-section">
        <h2>🥩 肉串系列</h2>
        <div id="meatMenu"></div>
    </div>

    <!-- 海鲜 / 特色 -->
    <div class="menu-section">
        <h2>🦑 海鲜 / 特色</h2>
        <div id="specialMenu"></div>
    </div>

    <!-- 素菜 / 主食 -->
    <div class="menu-section">
        <h2>🥬 素菜 / 主食</h2>
        <div id="veggieMenu"></div>
    </div>

    <!-- 购物车与提交 -->
    <div class="cart-summary" id="cartContainer">
        <div class="cart-total">
            <span>🧾 合计</span>
            <span id="totalPrice">¥0.00</span>
        </div>
        <div id="customerInfo">
            <input type="text" id="tableNumber" placeholder="桌号 (必填)">
            <input type="tel" id="phone" placeholder="手机号 (选填，用于联系)">
        </div>
        <button id="submitOrder" disabled>📤 确认下单</button>
        <div id="orderMessage" class="message hidden"></div>
    </div>

    <script>
        // ========== 菜单数据 ==========
        const menuItems = [
            // 肉串系列
            { id: 'pork', name: '大串猪肉', price: 1, category: 'meat' },
            { id: 'lamb', name: '鲜切羊肉', price: 3, category: 'meat' },
            { id: 'plum', name: '香辣梅肉', price: 2, category: 'meat' },
            { id: 'cartilage', name: '猪脆骨', price: 2.5, category: 'meat' },
            { id: 'garlic', name: '蒜瓣肉', price: 2, category: 'meat' },
            { id: 'wangjing', name: '望京小腰', price: 3, category: 'meat' },
            { id: 'tofu', name: '鱼豆腐', price: 2, category: 'meat' },
            { id: 'zhongbao', name: '掌中宝', price: 3, category: 'meat' },
            { id: 'sausage', name: '烤肠', price: 2, category: 'meat' },
            { id: 'aorta', name: '牛心管', price: 2, category: 'meat' },
            { id: 'porkSkin', name: '碳烤猪皮', price: 1, category: 'meat' },
            { id: 'gluten', name: '烤面筋', price: 2, category: 'meat' },
            { id: 'dougan', name: '烤豆干', price: 1, category: 'meat' },
            // 海鲜/特色
            { id: 'squid', name: '烤鱿鱼', price: 8, category: 'special' },
            { id: 'wing', name: '烤翅中（大）', price: 7, category: 'special' },
            { id: 'fish', name: '多味鱼', price: 4, category: 'special' },
            // 素菜/主食
            { id: 'chive', name: '烤韭菜', price: 10, category: 'veggie' },
            { id: 'chili', name: '烤辣椒', price: 1, category: 'veggie' },
            { id: 'bun', name: '烤馒头', price: 1, category: 'veggie' },
            { id: 'cabbage', name: '烤包菜', price: 10, category: 'veggie' },
            { id: 'mushroom', name: '烤金针菇', price: 10, category: 'veggie' },
            { id: 'peanut', name: '卤花生', price: 8, category: 'veggie' },
        ];

        // ========== 状态管理 ==========
        const cart = {}; // { itemId: quantity }

        // ========== 渲染菜单 ==========
        function renderMenu() {
            const meatDiv = document.getElementById('meatMenu');
            const specialDiv = document.getElementById('specialMenu');
            const veggieDiv = document.getElementById('veggieMenu');

            meatDiv.innerHTML = '';
            specialDiv.innerHTML = '';
            veggieDiv.innerHTML = '';

            menuItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">¥${item.price.toFixed(2)}</div>
                    </div>
                    <div class="quantity-control">
                        <button class="decrease" data-id="${item.id}">−</button>
                        <span class="qty" id="qty-${item.id}">0</span>
                        <button class="increase" data-id="${item.id}">+</button>
                    </div>
                `;

                if (item.category === 'meat') meatDiv.appendChild(itemDiv);
                else if (item.category === 'special') specialDiv.appendChild(itemDiv);
                else veggieDiv.appendChild(itemDiv);
            });

            // 绑定事件
            document.querySelectorAll('.increase').forEach(btn => {
                btn.addEventListener('click', () => changeQty(btn.dataset.id, 1));
            });
            document.querySelectorAll('.decrease').forEach(btn => {
                btn.addEventListener('click', () => changeQty(btn.dataset.id, -1));
            });
        }

        function changeQty(itemId, delta) {
            if (!cart[itemId]) cart[itemId] = 0;
            cart[itemId] += delta;
            if (cart[itemId] < 0) cart[itemId] = 0;
            document.getElementById(`qty-${itemId}`).textContent = cart[itemId];
            updateTotal();
            updateSubmitButton();
        }

        function updateTotal() {
            let total = 0;
            for (const [id, qty] of Object.entries(cart)) {
                const item = menuItems.find(i => i.id === id);
                if (item && qty > 0) total += item.price * qty;
            }
            document.getElementById('totalPrice').textContent = `¥${total.toFixed(2)}`;
        }

        function updateSubmitButton() {
            const hasItems = Object.values(cart).some(qty => qty > 0);
            const table = document.getElementById('tableNumber').value.trim();
            document.getElementById('submitOrder').disabled = !(hasItems && table);
        }

        // 监听桌号输入
        document.getElementById('tableNumber').addEventListener('input', updateSubmitButton);

        // ========== 提交订单 ==========
        document.getElementById('submitOrder').addEventListener('click', async () => {
            const table = document.getElementById('tableNumber').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const btn = document.getElementById('submitOrder');
            const msgDiv = document.getElementById('orderMessage');

            // 构建订单明细
            let orderDetails = '';
            let total = 0;
            for (const [id, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = menuItems.find(i => i.id === id);
                    orderDetails += `${item.name} x${qty}  ¥${(item.price * qty).toFixed(2)}\n`;
                    total += item.price * qty;
                }
            }

            const orderData = {
                shop: '久久家烧烤',
                table: table,
                phone: phone || '未提供',
                items: orderDetails,
                total: total.toFixed(2),
                time: new Date().toLocaleString('zh-CN')
            };

            // ============================================================
            // 🔴 重要：将下面的 URL 替换为你自己的 Formspree 或其他接收端点
            // 免费注册 https://formspree.io 获取端点，然后替换
            // ============================================================
            const SUBMIT_URL = 'https://formspree.io/f/你的表单ID';  // ← 替换这里

            btn.disabled = true;
            btn.textContent = '提交中...';
            msgDiv.classList.add('hidden');

            try {
                const response = await fetch(SUBMIT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    msgDiv.textContent = '✅ 下单成功！店家正在备餐，请稍等。';
                    msgDiv.className = 'message success';
                    // 清空购物车
                    for (const id in cart) cart[id] = 0;
                    renderMenu();
                    updateTotal();
                    document.getElementById('tableNumber').value = '';
                    document.getElementById('phone').value = '';
                } else {
                    throw new Error('提交失败');
                }
            } catch (error) {
                msgDiv.textContent = '❌ 网络开小差，请重试或直接叫服务员。';
                msgDiv.className = 'message error';
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 确认下单';
                msgDiv.classList.remove('hidden');
                setTimeout(() => msgDiv.classList.add('hidden'), 5000);
            }
        });

        // 初始化
        renderMenu();
        updateTotal();
    </script>
</body>
</html>
